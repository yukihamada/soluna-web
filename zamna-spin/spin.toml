spin_manifest_version = 2

[application]
name = "zamna-api"
version = "0.1.0"
description = "ZAMNA HAWAII 2026 — Zig/WASM API server"

[variables]
admin_key = { default = "test-key" }
stripe_secret_key = { default = "" }
resend_api_key = { default = "" }
admin_email = { default = "info@solun.art" }
anthropic_api_key = { default = "" }
whatsapp_token = { default = "" }
whatsapp_verify_token = { default = "zamna-verify-2026" }
whatsapp_phone_id = { default = "" }

[[trigger.http]]
route = "/api/..."
component = "zamna-api"

[component.zamna-api]
source = "main.wasm"
allowed_outbound_hosts = ["https://api.resend.com", "https://api.stripe.com", "https://api.anthropic.com", "https://graph.facebook.com"]
sqlite_databases = ["default"]
[component.zamna-api.variables]
admin_key = "{{ admin_key }}"
stripe_secret_key = "{{ stripe_secret_key }}"
resend_api_key = "{{ resend_api_key }}"
admin_email = "{{ admin_email }}"
anthropic_api_key = "{{ anthropic_api_key }}"
whatsapp_token = "{{ whatsapp_token }}"
whatsapp_verify_token = "{{ whatsapp_verify_token }}"
whatsapp_phone_id = "{{ whatsapp_phone_id }}"
[component.zamna-api.build]
command = "zig build -Doptimize=ReleaseSmall"
watch = ["src/**/*.zig"]

[[trigger.http]]
route = "/opengraph-image"
component = "zamna-api"

[[trigger.http]]
route = "/..."
component = "zamna-static"

[component.zamna-static]
source = "spin_static_fs.wasm"
files = [{ source = "static/", destination = "/" }]
