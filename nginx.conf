server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Custom pages — serve static Next.js output directly
    location /sponsor/ { try_files $uri $uri/ /sponsor/index.html =404; }
    location /investor/ { try_files $uri $uri/ /investor/index.html =404; }
    location /deal/     { try_files $uri $uri/ /deal/index.html =404; }
    location /schedule/ { try_files $uri $uri/ /schedule/index.html =404; }
    location /contract/ { try_files $uri $uri/ /contract/index.html =404; }

    # Static assets (_next/, assets/)
    location /_next/ { try_files $uri =404; }
    location /assets/ { try_files $uri =404; }
    location /videos/ { try_files $uri =404; }
    location /audio/  { try_files $uri =404; }

    # Root — Lovable SPA (handles all unmatched routes at /)
    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page 404 /404.html;
    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
}
