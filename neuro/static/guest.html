<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOLUNA CABIN</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0f;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 24px 16px;
  }
  .container { max-width: 420px; margin: 0 auto; }
  h1 {
    font-size: 1.6rem;
    font-weight: 300;
    letter-spacing: 0.3em;
    text-align: center;
    color: #c8a87c;
    margin-bottom: 32px;
  }
  .card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: #888;
    margin-bottom: 12px;
  }
  .wifi-info {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 1.1rem;
    color: #fff;
    word-break: break-all;
  }
  .wifi-label {
    font-size: 0.8rem;
    color: #666;
    margin-top: 8px;
  }
  .wifi-label:first-child { margin-top: 0; }
  .checkout-time {
    font-size: 1.8rem;
    font-weight: 200;
    color: #c8a87c;
    text-align: center;
  }
  .guide-list {
    list-style: none;
    padding: 0;
  }
  .guide-list li {
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 0.9rem;
    line-height: 1.5;
  }
  .guide-list li:last-child { border-bottom: none; }
  .emergency {
    text-align: center;
    font-size: 1.2rem;
    color: #e67e7e;
    letter-spacing: 0.05em;
  }
  .emergency a {
    color: #e67e7e;
    text-decoration: none;
  }
  .qr-section {
    text-align: center;
    padding: 16px 0;
  }
  .qr-placeholder {
    width: 120px;
    height: 120px;
    margin: 0 auto;
    background: rgba(255,255,255,0.06);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #555;
    font-size: 0.75rem;
  }
  .footer {
    text-align: center;
    margin-top: 24px;
    font-size: 0.7rem;
    color: #444;
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>
<div class="container">
  <h1>SOLUNA</h1>

  <div class="card">
    <div class="card-title">Wi-Fi</div>
    <div class="wifi-label">SSID</div>
    <div class="wifi-info">{{WIFI_SSID}}</div>
    <div class="wifi-label">Password</div>
    <div class="wifi-info">{{WIFI_PASSWORD}}</div>
  </div>

  <div class="card">
    <div class="card-title">Check-out</div>
    <div class="checkout-time">{{CHECKOUT_TIME}}</div>
  </div>

  <div class="card">
    <div class="card-title">Area Guide</div>
    <ul class="guide-list">
      {{AREA_GUIDE}}
    </ul>
  </div>

  <div class="card">
    <div class="card-title">Emergency</div>
    <div class="emergency">
      <a href="tel:{{EMERGENCY_PHONE}}">{{EMERGENCY_PHONE}}</a>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Share this page</div>
    <div class="qr-section">
      <div class="qr-placeholder">QR</div>
    </div>
  </div>

  <div class="footer">SOLUNA NEURO AI CABIN</div>
</div>
</body>
</html>
