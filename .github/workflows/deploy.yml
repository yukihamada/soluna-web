name: Deploy to Fly.io

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    concurrency: deploy-soluna-web

    steps:
      - uses: actions/checkout@v4

      # ── Node + npm cache ────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ── Next.js build (generates out/) ─────────────────────
      - name: Build Next.js
        run: npm ci && npm run build

      # ── Docker Buildx + GHA layer cache ────────────────────
      - uses: docker/setup-buildx-action@v3

      - name: Login to Fly.io registry
        uses: docker/login-action@v3
        with:
          registry: registry.fly.io
          username: x
          password: ${{ secrets.FLY_API_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: registry.fly.io/soluna-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Deploy pre-built image ──────────────────────────────
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --image registry.fly.io/soluna-web:latest --yes
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # ── Health check ────────────────────────────────────────
      - name: Verify deployment
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://solun.art/api/health 2>/dev/null || echo "000")
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed (HTTP $STATUS)" >&2
            exit 1
          fi
          echo "✓ Deployment healthy (HTTP $STATUS)"
