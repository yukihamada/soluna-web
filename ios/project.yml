name: Soluna
options:
  bundleIdPrefix: com.enablerdao
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    DEVELOPMENT_TEAM: 5BV85JW8US
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: 2
    SWIFT_VERSION: "5.9"

targets:
  Soluna:
    type: application
    platform: iOS
    sources:
      - path: Soluna
    settings:
      base:
        INFOPLIST_FILE: Soluna/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.enablerdao.soluna
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Soluna/Soluna.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Soluna/Info.plist
      properties:
        CFBundleDisplayName: SOLUNA
        CFBundleShortVersionString: "1.1.0"
        CFBundleVersion: "2"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
