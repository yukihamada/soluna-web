<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAMNA × SOLUNA FEST HAWAII 2026</title>
<meta name="description" content="2026, Oahu, Hawaii. Date TBD. Register for early access.">
<meta property="og:title" content="ZAMNA × SOLUNA FEST HAWAII 2026">
<meta property="og:description" content="2026, Oahu, Hawaii. Date TBD.">
<meta property="og:image" content="https://solun.art/img/pro_hawaii_hero.webp">
<meta property="og:url" content="https://solun.art/zamna">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://solun.art/img/pro_hawaii_hero.webp">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%23050505'/><circle cx='32' cy='32' r='20' fill='none' stroke='%23c8a455' stroke-width='2.5'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;700;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script defer src="https://enabler-analytics.fly.dev/t.js"></script>
<script defer src="/js/sln-track.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#040404;--gold:#c8a455;--text:#ede9e1;--sub:#5a5650;--sub2:#8a8480;--border:rgba(200,164,85,0.1)}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter','Helvetica Neue',sans-serif;overflow:hidden}
@media(max-width:640px){html,body{overflow:auto}}

/* Video BG */
.video-bg{position:fixed;inset:0;z-index:0;width:100%;height:100%;object-fit:cover;filter:brightness(0.22) saturate(0.5)}
.bg-overlay{position:fixed;inset:0;z-index:1;
  background:radial-gradient(ellipse at 50% 60%,rgba(200,164,85,.06) 0%,transparent 55%),
             radial-gradient(ellipse at 80% 20%,rgba(200,164,85,.03) 0%,transparent 40%)}
.star{position:absolute;border-radius:50%;background:#fff;animation:tw var(--d,3s) ease-in-out infinite var(--del,0s)}
@keyframes tw{0%,100%{opacity:var(--op,.2)}50%{opacity:.8}}

/* LAYOUT */
.wrap{position:relative;z-index:10;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:20px 40px}
.nav-brand{font-size:11px;font-weight:700;letter-spacing:.26em;color:var(--gold);text-decoration:none}
.nav-back{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--sub2);text-decoration:none;transition:color .2s}
.nav-back:hover{color:var(--gold)}
@media(max-width:640px){nav{padding:16px 20px}}

/* CONTENT */
.eyebrow{font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);font-weight:600;border:1px solid var(--border);border-radius:100px;padding:6px 18px;margin-bottom:36px;display:inline-block}
h1{font-family:'Shippori Mincho B1',serif;font-size:clamp(2.2rem,7vw,5.5rem);font-weight:800;line-height:1.08;color:#f4f0ea;margin-bottom:16px;letter-spacing:.02em}
h1 span{color:var(--gold)}
.date{font-size:clamp(.75rem,1.5vw,.9rem);letter-spacing:.2em;text-transform:uppercase;color:var(--sub2);font-weight:300;margin-bottom:52px}

/* FORM */
.form-wrap{width:100%;max-width:360px;margin:0 auto}
.form-row{display:flex;gap:8px}
.input{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:13px 16px;font-size:13px;color:var(--text);font-family:inherit;outline:none;transition:border-color .2s;-webkit-appearance:none}
.input:focus{border-color:var(--gold)}
.input::placeholder{color:var(--sub)}
.btn{padding:13px 22px;background:var(--gold);color:#040404;border:none;border-radius:8px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;font-family:inherit;white-space:nowrap;transition:opacity .2s;flex-shrink:0}
.btn:hover{opacity:.85}
.note{font-size:10px;color:var(--sub);margin-top:12px;letter-spacing:.06em}
.done{display:none;margin-top:20px;font-size:13px;color:var(--gold);letter-spacing:.06em}

/* Countdown */
.countdown{display:flex;gap:20px;justify-content:center;margin-bottom:44px}
.cd-unit{text-align:center}
.cd-num{font-size:clamp(28px,6vw,52px);font-weight:100;color:#fff;line-height:1;letter-spacing:-.04em;font-variant-numeric:tabular-nums}
.cd-label{font-size:8px;letter-spacing:.28em;text-transform:uppercase;color:var(--sub);margin-top:5px}
.cd-sep{font-size:clamp(24px,5vw,44px);font-weight:100;color:rgba(200,164,85,.3);line-height:1;padding-top:2px}
</style>
</head>
<body>

<video class="video-bg" autoplay muted loop playsinline>
  <source src="/img/soluna_video.mp4" type="video/mp4">
</video>
<div class="bg-overlay"></div>
<div id="bg" style="position:fixed;inset:0;z-index:2;pointer-events:none"></div>

<nav>
  <a href="/" class="nav-brand">SOLUNA</a>
  <a href="/" class="nav-back">← Back</a>
</nav>

<div class="wrap">
  <div class="eyebrow">ZAMNA × SOLUNA FEST HAWAII 2026</div>
  <h1>この木は<br><span>覚えている</span></h1>
  <div class="date">Oahu, Hawaii &nbsp;·&nbsp; 2026</div>

  <div class="countdown" id="countdown">
    <div class="cd-unit"><div class="cd-num" id="cd-d">--</div><div class="cd-label">Days</div></div>
    <div class="cd-sep">·</div>
    <div class="cd-unit"><div class="cd-num" id="cd-h">--</div><div class="cd-label">Hours</div></div>
    <div class="cd-sep">·</div>
    <div class="cd-unit"><div class="cd-num" id="cd-m">--</div><div class="cd-label">Min</div></div>
    <div class="cd-sep">·</div>
    <div class="cd-unit"><div class="cd-num" id="cd-s">--</div><div class="cd-label">Sec</div></div>
  </div>

  <div class="form-wrap">
    <div class="form-row">
      <input class="input" id="email" type="email" placeholder="your@email.com" autocomplete="email">
      <button class="btn" onclick="register()">Notify Me</button>
    </div>
    <div class="note">詳細が決まり次第、最速でお知らせします</div>
    <div class="done" id="done">🌺 &nbsp;登録完了。ハワイでお会いしましょう。</div>
  </div>
</div>

<script>
// Stars
(function(){
  const bg=document.getElementById('bg');
  for(let i=0;i<60;i++){
    const s=document.createElement('div');s.className='star';
    const sz=Math.random()*2+0.4;
    s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*4+2).toFixed(1)}s;--del:${(Math.random()*6).toFixed(1)}s;--op:${(Math.random()*0.3+0.08).toFixed(2)}`;
    bg.appendChild(s);
  }
})();

// Countdown to 2026-11-07 00:00 HST (Hawaii UTC-10)
(function tick(){
  var target=new Date('2026-11-07T10:00:00Z').getTime();
  function update(){
    var diff=target-Date.now();
    if(diff<=0){document.getElementById('countdown').style.display='none';return;}
    var d=Math.floor(diff/86400000);
    var h=Math.floor((diff%86400000)/3600000);
    var m=Math.floor((diff%3600000)/60000);
    var s=Math.floor((diff%60000)/1000);
    document.getElementById('cd-d').textContent=String(d).padStart(2,'0');
    document.getElementById('cd-h').textContent=String(h).padStart(2,'0');
    document.getElementById('cd-m').textContent=String(m).padStart(2,'0');
    document.getElementById('cd-s').textContent=String(s).padStart(2,'0');
    setTimeout(update,1000);
  }
  update();
})();

async function register(){
  const email=document.getElementById('email').value.trim();
  if(!email||!email.includes('@')){document.getElementById('email').style.borderColor='#ef4444';return}
  try{
    await fetch('/api/soluna/akiya-signup',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email,source:'zamna'}),keepalive:true
    });
  }catch{}
  if(window.sln) sln.track('email_signup',{source:'zamna'});
  document.querySelector('.form-row').style.display='none';
  document.querySelector('.note').style.display='none';
  document.getElementById('done').style.display='block';
}
document.getElementById('email').addEventListener('keydown',function(e){if(e.key==='Enter')register()});
</script>
</body>
</html>
