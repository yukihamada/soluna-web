<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAPKOP 3D</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #0d1117; overflow: hidden; }
canvas { display: block; }
#ui {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 10px; z-index: 10;
}
.btn {
  background: rgba(255,255,255,0.1); color: white;
  border: 1px solid rgba(255,255,255,0.25);
  padding: 9px 18px; border-radius: 20px; cursor: pointer;
  font-size: 13px; font-family: -apple-system, sans-serif;
  backdrop-filter: blur(10px); transition: all 0.2s;
  white-space: nowrap;
}
.btn:hover { background: rgba(255,255,255,0.2); }
.btn.active { background: rgba(255,255,255,0.3); border-color: rgba(255,255,255,0.5); }
#title {
  position: fixed; top: 20px; left: 24px; z-index: 10;
  color: white; font-family: -apple-system, sans-serif;
  font-size: 20px; font-weight: 700; letter-spacing: 3px;
  text-shadow: 0 2px 12px rgba(0,0,0,0.7);
}
#hint {
  position: fixed; top: 20px; right: 24px; z-index: 10;
  color: rgba(255,255,255,0.45); font-size: 12px;
  font-family: -apple-system, sans-serif; text-align: right;
  line-height: 1.6; transition: opacity 2s;
}
#loading {
  position: fixed; inset: 0; background: #0d1117;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: white; font-family: -apple-system, sans-serif; z-index: 100; gap: 16px;
}
#loading-bar-wrap {
  width: 200px; height: 3px; background: rgba(255,255,255,0.15); border-radius: 2px;
}
#loading-bar { width: 0%; height: 100%; background: white; border-radius: 2px; transition: width 0.3s; }
</style>
  <script defer src="https://enabler-analytics.fly.dev/t.js"></script>
</head>
<body>
<div id="loading">
  <div style="font-size:15px;letter-spacing:2px;opacity:0.8">TAPKOP 3D</div>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
  <div id="loading-text" style="font-size:12px;opacity:0.5">深度マップ生成中…</div>
</div>
<div id="title">TAPKOP</div>
<div id="hint">ドラッグ: 回転<br>スクロール: ズーム<br>右クリック: 移動</div>
<div id="ui">
  <button class="btn" id="btn-auto">▶ 自動回転</button>
  <button class="btn" id="btn-side">横から見る</button>
  <button class="btn" id="btn-top">真上から</button>
  <button class="btn" id="btn-height">高さ: 大</button>
</div>

<script type="importmap">

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const IMG_URL   = '/img/integrated_summer_aerial.jpg';
const DEPTH_URL = '/img/tapkop_depth.png';
const ASPECT    = 1408 / 768;
const PLANE_W   = 12;
const PLANE_H   = PLANE_W / ASPECT;
const SEG_W     = 256;
const SEG_H     = Math.round(SEG_W / ASPECT);

// ── Renderer ──────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
document.body.appendChild(renderer.domElement);

// ── Scene ─────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d1117);
scene.fog = new THREE.Fog(0x0d1117, 25, 55);

// ── Camera – start at oblique side angle ─────────────────
const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 11);

// ── Controls ──────────────────────────────────────────────
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.5, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 3;
controls.maxDistance = 22;
controls.autoRotate = false;
controls.autoRotateSpeed = 0.6;
controls.update();

// ── Lights ────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffeedd, 0.55));

const sun = new THREE.DirectionalLight(0xfff4d0, 1.4);
sun.position.set(4, 10, 6);
sun.castShadow = true;
sun.shadow.mapSize.setScalar(2048);
sun.shadow.camera.near = 0.5; sun.shadow.camera.far = 40;
sun.shadow.camera.left = sun.shadow.camera.bottom = -10;
sun.shadow.camera.right = sun.shadow.camera.top   =  10;
scene.add(sun);
const fillLight = new THREE.DirectionalLight(0x90b8e8, 0.35);
fillLight.position.set(-4, 6, -6);
scene.add(fillLight);

// ── Load & build ──────────────────────────────────────────
function setProgress(pct, txt) {
  document.getElementById('loading-bar').style.width = pct + '%';
  if (txt) document.getElementById('loading-text').textContent = txt;
}

let terrainMesh = null;

const loader = new THREE.TextureLoader();
setProgress(20, '画像読み込み中…');

// Load photo + AI depth map in parallel
const photoTex = loader.load(IMG_URL, () => setProgress(50, '深度マップ読み込み中…'));
photoTex.colorSpace = THREE.SRGBColorSpace;

const depthTex = loader.load(DEPTH_URL, () => {
  setProgress(80, '3Dメッシュ構築中…');

  const geo = new THREE.PlaneGeometry(PLANE_W, PLANE_H, SEG_W - 1, SEG_H - 1);
  geo.rotateX(-Math.PI / 2);

  const mat = new THREE.MeshStandardMaterial({
    map: photoTex,
    displacementMap: depthTex,
    displacementScale: 2.2,
    displacementBias: 0.0,
    roughness: 0.8,
    metalness: 0.0,
  });

  terrainMesh = new THREE.Mesh(geo, mat);
  terrainMesh.castShadow = true;
  terrainMesh.receiveShadow = true;
  scene.add(terrainMesh);

  // Dark ground base
  const gGeo = new THREE.PlaneGeometry(30, 30);
  gGeo.rotateX(-Math.PI / 2);
  const gnd = new THREE.Mesh(gGeo, new THREE.MeshStandardMaterial({ color: 0x0d1117 }));
  gnd.position.y = -0.05;
  scene.add(gnd);

  setProgress(100);
  setTimeout(() => {
    document.getElementById('loading').style.display = 'none';
    setTimeout(() => { document.getElementById('hint').style.opacity = '0'; }, 4000);
  }, 300);
});
setProgress(10, '読み込み中…');

// ── Camera animation helper ────────────────────────────────
function flyTo(toPos, toTarget) {
  const fromPos = camera.position.clone();
  const fromTgt = controls.target.clone();
  let t = 0;
  const id = setInterval(() => {
    t = Math.min(t + 0.04, 1);
    const e = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
    camera.position.lerpVectors(fromPos, toPos, e);
    controls.target.lerpVectors(fromTgt, toTarget, e);
    controls.update();
    if (t >= 1) clearInterval(id);
  }, 16);
}

// ── UI ────────────────────────────────────────────────────
let autoOn = false;
document.getElementById('btn-auto').addEventListener('click', () => {
  autoOn = !autoOn;
  controls.autoRotate = autoOn;
  document.getElementById('btn-auto').textContent = autoOn ? '⏸ 停止' : '▶ 自動回転';
  document.getElementById('btn-auto').classList.toggle('active', autoOn);
});

document.getElementById('btn-side').addEventListener('click', () =>
  flyTo(new THREE.Vector3(11, 3.0, 0), new THREE.Vector3(0, 0.8, 0)));

document.getElementById('btn-top').addEventListener('click', () =>
  flyTo(new THREE.Vector3(0, 15, 0.1), new THREE.Vector3(0, 0, 0)));

let hIdx = 2;
const hLabels = ['高さ: 小', '高さ: 中', '高さ: 大'];
const hVals   = [1.0, 1.9, 2.8];
document.getElementById('btn-height').addEventListener('click', () => {
  hIdx = (hIdx + 1) % 3;
  document.getElementById('btn-height').textContent = hLabels[hIdx];
  if (terrainMesh) terrainMesh.material.displacementScale = hVals[hIdx];
});

// ── Resize ────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Loop ──────────────────────────────────────────────────
(function loop() { requestAnimationFrame(loop); controls.update(); renderer.render(scene, camera); })();
</script>
<script defer src="/js/sln-chat-btn.js"></script>
<script defer src="/js/sln-desktop.js"></script>
<script src="/js/dc.js"></script>
</body>
</html>
