*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#c8a455;--bg:#050505;--text:#f0ece4;--dim:#777}
body{background:var(--bg);color:var(--text);font-family:'Helvetica Neue',-apple-system,'Noto Sans JP',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;position:relative;overflow:hidden}

.links{display:flex;flex-wrap:wrap;gap:12px;justify-content:center}
.btn{padding:12px 28px;border-radius:100px;font-size:13px;font-weight:700;transition:all .2s}
.btn-gold{background:var(--gold);color:#040404}
.btn-ghost{border:1px solid rgba(200,164,85,.3);color:var(--gold)}
