<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>SOLUNA チャット</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%23c8a455'/></svg>">
<script defer src="https://enabler-analytics.fly.dev/t.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#c8a455;
  --gold-dim:rgba(200,164,85,.35);
  --gold-soft:rgba(200,164,85,.08);
  --bg:#050505;
  --bg2:#0a0a0a;
  --bg3:#101010;
  --bg4:#141414;
  --line:#181818;
  --text:#f0ece4;
  --dim:#666;
  --muted:#333;
  --green:#9bc46d;
  --green-dim:rgba(155,196,109,.25);
  --red:#e05555;
  --r:14px;
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{color:var(--text);font-family:-apple-system,'Helvetica Neue','Hiragino Sans',sans-serif;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;overscroll-behavior:none}

/* ── HEADER ── */
.hd{flex:0 0 auto;height:52px;display:flex;align-items:center;padding:0 12px;background:rgba(5,5,5,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--line);position:relative;z-index:20;gap:8px}
.hd-back{display:flex;align-items:center;gap:5px;color:var(--gold);font-size:13px;font-weight:600;text-decoration:none;padding:8px 4px;border-radius:8px;flex-shrink:0}
.hd-back svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round}
.hd-center{flex:1;display:flex;flex-direction:column;align-items:center;overflow:hidden}
.hd-title{font-size:13px;font-weight:700;letter-spacing:.06em;color:var(--text)}
.hd-online{font-size:10px;color:var(--dim);display:flex;align-items:center;gap:4px;margin-top:1px}
.online-dot{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.hd-right{display:flex;align-items:center;gap:4px;flex-shrink:0}
.hd-btn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;border-radius:9px;cursor:pointer;color:var(--dim);transition:all .15s}
.hd-btn:hover{background:var(--bg3);color:var(--text)}
.hd-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* ── MESSAGES ── */
.msgs{flex:1 1 auto;overflow-y:auto;overflow-x:hidden;overscroll-behavior:contain;padding:12px 0 4px;scroll-behavior:smooth}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:#1a1a1a;border-radius:3px}

/* Day separator */
.day-sep{display:flex;align-items:center;gap:10px;padding:12px 16px;user-select:none}
.day-sep::before,.day-sep::after{content:'';flex:1;height:1px;background:var(--line)}
.day-sep span{font-size:9.5px;color:var(--muted);letter-spacing:.1em;flex-shrink:0;white-space:nowrap}

/* Message group */
.msg-group{padding:2px 0}
.msg-group.mine{--bubble-bg:rgba(200,164,85,.13);--bubble-border:rgba(200,164,85,.22)}
.msg-group:not(.mine){--bubble-bg:var(--bg3);--bubble-border:var(--line)}

/* Message row */
.msg-row{display:flex;gap:8px;padding:1px 12px;align-items:flex-end;position:relative}
.msg-row.compact{padding-top:0;padding-bottom:0}
.msg-group.mine .msg-row{flex-direction:row-reverse}

/* Avatar */
.avatar{flex:0 0 30px;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--gold);background:linear-gradient(135deg,rgba(200,164,85,.2),rgba(200,164,85,.06));border:1px solid rgba(200,164,85,.2);margin-bottom:2px;flex-shrink:0;letter-spacing:0;transition:opacity .15s}
.avatar.ai{color:var(--green);background:linear-gradient(135deg,rgba(155,196,109,.18),rgba(155,196,109,.04));border-color:rgba(155,196,109,.25)}
.avatar.placeholder{opacity:0;pointer-events:none}

/* Bubble content */
.msg-content{max-width:calc(100% - 120px);display:flex;flex-direction:column;gap:1px}
@media(min-width:700px){.msg-content{max-width:560px}}
.msg-group.mine .msg-content{align-items:flex-end}

.msg-meta{display:flex;align-items:baseline;gap:5px;padding:0 4px;margin-bottom:2px}
.msg-group.mine .msg-meta{flex-direction:row-reverse}
.msg-sender{font-size:10.5px;font-weight:700;color:var(--dim)}
.msg-sender.ai-s{color:var(--green)}
.msg-sender.admin-s{color:var(--gold)}
.msg-sender.founder-s{color:#b8a0e8}
.msg-sender.owner-s{color:#e8c88a}
.msg-time{font-size:9px;color:var(--muted)}

/* Bubble */
.bubble{display:inline-block;padding:8px 12px;border-radius:var(--r);border-radius-bottom-right:4px;background:var(--bubble-bg);border:1px solid var(--bubble-border);font-size:13.5px;line-height:1.65;color:var(--text);word-break:break-word;white-space:pre-wrap;position:relative;cursor:default;border-bottom-left-radius:var(--r);border-bottom-right-radius:var(--r)}
.msg-group:not(.mine) .bubble{border-top-left-radius:4px}
.msg-group.mine .bubble{border-top-right-radius:4px}
.bubble.ai{background:rgba(155,196,109,.06);border-color:rgba(155,196,109,.2);border-top-left-radius:4px}
.msg-row.compact .bubble{border-top-left-radius:var(--r)}
.msg-group.mine .msg-row.compact .bubble{border-top-right-radius:var(--r)}

/* Image in bubble */
.bubble-img{max-width:220px;max-height:260px;border-radius:10px;display:block;cursor:pointer;object-fit:cover}
.msg-group.mine .bubble-img{margin-left:auto}

/* Reply preview inside bubble */
.reply-preview{display:flex;gap:6px;padding:5px 8px;margin-bottom:6px;background:rgba(255,255,255,.04);border-radius:6px;border-left:2px solid var(--gold-dim);cursor:pointer}
.reply-preview .rp-name{font-size:9px;font-weight:700;color:var(--gold);margin-bottom:2px}
.reply-preview .rp-text{font-size:11px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}

/* Hover action bar */
.msg-actions{position:absolute;top:-18px;opacity:0;pointer-events:none;transition:opacity .12s;z-index:10;display:flex;background:var(--bg3);border:1px solid var(--line);border-radius:100px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.msg-row:hover .msg-actions,.msg-row.ctx-open .msg-actions{opacity:1;pointer-events:auto}
.msg-group.mine .msg-actions{right:8px}
.msg-group:not(.mine) .msg-actions{left:46px}
.act-btn{display:flex;align-items:center;justify-content:center;width:32px;height:28px;border:none;background:transparent;cursor:pointer;font-size:13px;color:var(--dim);transition:background .12s;border-radius:0}
.act-btn:hover{background:var(--bg4);color:var(--text)}
.act-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.act-btn.del:hover{color:var(--red)}

/* Reactions */
.reactions{display:flex;flex-wrap:wrap;gap:3px;padding:0 4px;margin-top:2px}
.msg-group.mine .reactions{justify-content:flex-end}
.r-pill{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:100px;background:var(--bg3);border:1px solid var(--line);font-size:11px;cursor:pointer;transition:all .12s;user-select:none;-webkit-user-select:none}
.r-pill:hover{border-color:var(--gold-dim);background:var(--gold-soft)}
.r-pill.mine{border-color:rgba(200,164,85,.5);background:var(--gold-soft)}
.r-pill .cnt{font-size:9px;color:var(--dim)}

/* Typing indicator */
.typing{display:none;align-items:center;gap:8px;padding:4px 12px}
.typing.show{display:flex}
.typing-av{width:30px;height:30px;border-radius:50%;background:var(--green-dim);border:1px solid rgba(155,196,109,.25);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--green);flex-shrink:0}
.typing-dots{display:flex;gap:3px;padding:9px 14px;background:var(--bg3);border:1px solid var(--line);border-radius:14px 14px 14px 4px}
.typing-dots span{width:5px;height:5px;border-radius:50%;background:var(--muted);animation:tdot 1.3s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,60%,100%{transform:translateY(0);background:var(--muted)}30%{transform:translateY(-4px);background:var(--green)}}

/* Scroll-to-bottom FAB */
.scroll-fab{position:absolute;bottom:16px;right:16px;width:36px;height:36px;border-radius:50%;background:var(--bg3);border:1px solid var(--line);box-shadow:0 2px 12px rgba(0,0,0,.5);cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;z-index:15}
.scroll-fab.show{opacity:1;pointer-events:auto}
.scroll-fab svg{width:16px;height:16px;stroke:var(--gold);fill:none;stroke-width:2.2;stroke-linecap:round}
.scroll-fab .unread{position:absolute;top:-5px;right:-5px;min-width:16px;height:16px;border-radius:8px;background:var(--gold);color:#050505;font-size:8px;font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 4px;display:none}
.scroll-fab.has-unread .unread{display:flex}

/* ── REPLY STRIP ── */
.reply-strip{flex:0 0 auto;display:none;align-items:center;gap:8px;padding:8px 12px;background:var(--bg2);border-top:1px solid var(--line);animation:slideIn .15s ease}
.reply-strip.show{display:flex}
@keyframes slideIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.rs-bar{flex:0 0 2px;align-self:stretch;background:var(--gold);border-radius:2px;flex-shrink:0}
.rs-body{flex:1;overflow:hidden}
.rs-name{font-size:9.5px;color:var(--gold);font-weight:700;margin-bottom:2px}
.rs-text{font-size:11px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rs-close{flex-shrink:0;width:28px;height:28px;border:none;background:transparent;cursor:pointer;color:var(--dim);display:flex;align-items:center;justify-content:center;border-radius:6px;transition:all .12s}
.rs-close:hover{background:var(--bg3);color:var(--text)}
.rs-close svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}

/* Image preview strip */
.img-strip{flex:0 0 auto;display:none;padding:8px 12px;background:var(--bg2);border-top:1px solid var(--line)}
.img-strip.show{display:flex;gap:8px;align-items:center}
.img-thumb{position:relative;width:60px;height:60px;border-radius:8px;overflow:hidden;border:1px solid var(--line);flex-shrink:0}
.img-thumb img{width:100%;height:100%;object-fit:cover}
.img-thumb-del{position:absolute;top:2px;right:2px;width:16px;height:16px;background:rgba(0,0,0,.7);border-radius:50%;border:none;cursor:pointer;color:#fff;font-size:9px;display:flex;align-items:center;justify-content:center}
.img-strip-hint{font-size:11px;color:var(--dim)}

/* ── INPUT ── */
.input-wrap{flex:0 0 auto;background:var(--bg2);border-top:1px solid var(--line);padding:8px 10px;padding-bottom:calc(8px + env(safe-area-inset-bottom))}
.input-row{display:flex;gap:6px;align-items:flex-end;max-width:720px;margin:0 auto}
.input-add{flex-shrink:0;width:36px;height:36px;border-radius:50%;border:none;background:transparent;cursor:pointer;color:var(--dim);display:flex;align-items:center;justify-content:center;transition:all .15s}
.input-add:hover{background:var(--bg3);color:var(--text)}
.input-add svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round}
.input-box{flex:1;background:var(--bg3);border:1px solid var(--line);border-radius:18px;padding:9px 14px;font-size:14px;color:var(--text);font-family:inherit;outline:none;resize:none;max-height:120px;line-height:1.55;transition:border-color .2s;overflow-y:auto;-webkit-overflow-scrolling:touch}
.input-box::placeholder{color:var(--muted)}
.input-box:focus{border-color:rgba(200,164,85,.4)}
.send-btn{flex-shrink:0;width:36px;height:36px;border-radius:50%;background:var(--gold);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s}
.send-btn:hover{filter:brightness(1.1);transform:scale(1.05)}
.send-btn:disabled{opacity:.3;cursor:not-allowed;transform:none;filter:none}
.send-btn svg{width:14px;height:14px;fill:#050505;transform:translateX(1px)}

/* ── EMOJI REACTION PICKER (bottom sheet) ── */
.react-sheet-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:opacity .2s}
.react-sheet-overlay.show{opacity:1;pointer-events:auto}
.react-sheet{position:fixed;bottom:0;left:0;right:0;z-index:201;background:var(--bg2);border-top:1px solid var(--line);border-radius:16px 16px 0 0;padding:12px 16px 20px;padding-bottom:calc(20px + env(safe-area-inset-bottom));transform:translateY(100%);transition:transform .22s cubic-bezier(.32,1,.32,1)}
.react-sheet.show{transform:translateY(0)}
.rs-grip{width:36px;height:3px;background:#222;border-radius:2px;margin:0 auto 12px}
.rs-emojis{display:flex;gap:4px;justify-content:center;flex-wrap:wrap}
.rs-emoji-btn{font-size:26px;padding:8px 10px;border:none;background:transparent;cursor:pointer;border-radius:12px;transition:background .12s;line-height:1}
.rs-emoji-btn:hover,.rs-emoji-btn:active{background:rgba(255,255,255,.07)}

/* ── IMAGE LIGHTBOX ── */
.lightbox{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.lightbox.show{opacity:1;pointer-events:auto}
.lightbox img{max-width:90vw;max-height:90vh;object-fit:contain;border-radius:8px}

/* ── LOGIN GATE ── */
.gate{position:fixed;inset:0;z-index:500;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;gap:18px}
.gate-logo{font-size:11px;font-weight:800;letter-spacing:.25em;color:var(--gold)}
.gate-title{font-size:clamp(1.3rem,5vw,1.7rem);font-weight:800;letter-spacing:-.03em;text-align:center;line-height:1.2}
.gate-sub{font-size:12px;color:var(--dim);text-align:center;line-height:1.9;max-width:280px}
.gate-form{width:100%;max-width:300px;display:flex;flex-direction:column;gap:8px}
.gate-input{padding:13px 15px;background:var(--bg3);border:1px solid var(--line);border-radius:12px;color:var(--text);font-size:15px;font-family:inherit;outline:none;transition:border-color .2s}
.gate-input:focus{border-color:rgba(200,164,85,.5)}
.gate-btn{padding:14px;background:var(--gold);color:#050505;font-weight:800;font-size:14px;border:none;border-radius:12px;cursor:pointer;font-family:inherit;transition:opacity .2s}
.gate-btn:hover{opacity:.88}
.gate-btn:disabled{opacity:.35;cursor:not-allowed}
.gate-msg{font-size:11px;color:var(--dim);text-align:center;min-height:16px}

/* ── EMPTY STATE ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px;padding:32px;text-align:center}
.empty-icon{font-size:36px;margin-bottom:4px}
.empty-text{font-size:13px;color:var(--dim)}
.empty-sub{font-size:11px;color:var(--muted)}

/* ── DESKTOP ── */
@media(min-width:700px){
  .msgs{padding:16px 0}
  .msg-row{padding:2px 20px}
  .msg-row:not(.compact){padding-top:4px}
  .day-sep{padding:16px 20px}
  .typing{padding:4px 20px}
  .input-wrap{padding:10px 20px 14px}
  .msg-content{max-width:600px}
  .reply-strip,.img-strip{padding:8px 20px}
}

/* Toast notification */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--bg3);border:1px solid var(--line);border-radius:100px;padding:8px 16px;font-size:12px;color:var(--dim);opacity:0;transition:all .2s;pointer-events:none;z-index:100;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- Login Gate -->
<div class="gate" id="gate">
  <div class="gate-logo">SOLUNA</div>
  <h1 class="gate-title">コミュニティ<br>チャット</h1>
  <p class="gate-sub">メンバーとAI「ソル」が<br>話せる、SOLUNAの場所。</p>
  <div class="gate-form" id="gate-email-step">
    <input class="gate-input" id="gate-email" type="email" placeholder="メールアドレス" autocomplete="email" />
    <button class="gate-btn" id="gate-email-btn" onclick="sendOTP()">コードを送る</button>
    <p class="gate-msg" id="gate-msg"></p>
  </div>
  <div class="gate-form" id="gate-otp-step" style="display:none">
    <input class="gate-input" id="gate-otp" type="text" placeholder="6桁のコード" maxlength="6" inputmode="numeric" autocomplete="one-time-code" />
    <button class="gate-btn" id="gate-otp-btn" onclick="verifyOTP()">ログイン</button>
    <p class="gate-msg" id="gate-otp-msg"></p>
  </div>
</div>

<!-- Header -->
<header class="hd">
  <a class="hd-back" href="app">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    戻る
  </a>
  <div class="hd-center">
    <div class="hd-title">SOLUNA CHAT</div>
    <div class="hd-online">
      <div class="online-dot"></div>
      <span id="online-count">接続中…</span>
    </div>
  </div>
  <div class="hd-right">
    <button class="hd-btn" onclick="logout()" title="ログアウト">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
</header>

<!-- Messages + FAB -->
<div style="flex:1;position:relative;overflow:hidden;display:flex;flex-direction:column">
  <div id="pinned-bar" style="display:none;padding:6px 12px;background:rgba(200,164,85,.08);border-bottom:1px solid rgba(200,164,85,.15);font-size:13px;color:#c8a455;cursor:pointer;"></div>
  <div class="msgs" id="msgs">
    <div class="empty" id="empty">
      <div class="empty-icon">🏔</div>
      <div class="empty-text">最初のメッセージを送ってみよう</div>
      <div class="empty-sub">北海道・熱海・ハワイ、どんな話でも</div>
    </div>
  </div>
  <div class="scroll-fab" id="scroll-fab" onclick="scrollToBottom(true)">
    <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    <div class="unread" id="fab-badge">0</div>
  </div>
</div>

<!-- Typing indicator -->
<div class="typing" id="typing">
  <div class="typing-av">S</div>
  <div class="typing-dots"><span></span><span></span><span></span></div>
</div>

<!-- Reply strip -->
<div class="reply-strip" id="reply-strip">
  <div class="rs-bar"></div>
  <div class="rs-body">
    <div class="rs-name" id="rs-name"></div>
    <div class="rs-text" id="rs-text"></div>
  </div>
  <button class="rs-close" onclick="cancelReply()">
    <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
</div>

<!-- Image preview strip -->
<div class="img-strip" id="img-strip">
  <div class="img-thumb" id="img-thumb">
    <img id="img-preview" src="" alt="">
    <button class="img-thumb-del" onclick="clearImage()">×</button>
  </div>
  <div class="img-strip-hint">画像を送信します</div>
</div>

<!-- Input -->
<div class="input-wrap">
  <div class="input-row">
    <button class="input-add" onclick="triggerImagePick()" title="画像を添付">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    </button>
    <textarea class="input-box" id="input-box" placeholder="メッセージを入力…" rows="1"
      onkeydown="handleKey(event)" oninput="handleInput(this)" onpaste="handlePaste(event)"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled title="送信 (Enter)">
      <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke="#050505" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
</div>

<!-- Hidden file input -->
<input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleFileSelect(event)">

<!-- Reaction picker sheet -->
<div class="react-sheet-overlay" id="react-overlay" onclick="closeReactSheet()"></div>
<div class="react-sheet" id="react-sheet">
  <div class="rs-grip"></div>
  <div class="rs-emojis" id="rs-emojis"></div>
</div>

<!-- Image lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="" alt="">
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const API = "";
const EMOJIS = ["❤️","🔥","👍","🏔","🌊","✨","😂","🙌","🎉","👏","🤔","😮"];
let token = localStorage.getItem("sln_token") || "";
let myId = null;
let myName = "";
let myMemberType = "";
let es = null;
let sending = false;
let pendingImage = null; // base64 data URL
let replyTo = null; // { id, name, text }
let pendingReactMsgId = null;
let unreadCount = 0;
const rendered = new Set();
const reactions = new Map(); // msgId → { emoji: {count, mine} }

// ── AUTH ──────────────────────────────────────────────────────────────
async function sendOTP() {
  const email = document.getElementById("gate-email").value.trim();
  if (!email) return;
  const btn = document.getElementById("gate-email-btn");
  btn.disabled = true;
  document.getElementById("gate-msg").textContent = "送信中…";
  try {
    const r = await fetch(`${API}/api/soluna/otp`, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({email}) });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || "送信エラー");
    document.getElementById("gate-email-step").style.display = "none";
    document.getElementById("gate-otp-step").style.display = "flex";
    document.getElementById("gate-otp-msg").textContent = `${email} にコードを送りました`;
    document.getElementById("gate-otp").focus();
  } catch(e) {
    document.getElementById("gate-msg").textContent = e.message;
    btn.disabled = false;
  }
}

async function verifyOTP() {
  const email = document.getElementById("gate-email").value.trim();
  const code = document.getElementById("gate-otp").value.trim();
  const btn = document.getElementById("gate-otp-btn");
  btn.disabled = true;
  document.getElementById("gate-otp-msg").textContent = "確認中…";
  try {
    const r = await fetch(`${API}/api/soluna/verify`, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({email,code}) });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || "認証エラー");
    token = d.token;
    localStorage.setItem("sln_token", token);
    await initChat();
  } catch(e) {
    document.getElementById("gate-otp-msg").textContent = e.message;
    btn.disabled = false;
  }
}

function logout() {
  if (es) es.close();
  localStorage.removeItem("sln_token");
  location.reload();
}

document.getElementById("gate-email").addEventListener("keydown", e => { if (e.key==="Enter") sendOTP(); });
document.getElementById("gate-otp").addEventListener("keydown", e => { if (e.key==="Enter") verifyOTP(); });

// ── INIT ──────────────────────────────────────────────────────────────
async function initChat() {
  if (!token) return;
  try {
    const r = await fetch(`${API}/api/soluna/me`, { headers:{ Authorization:`Bearer ${token}` } });
    if (!r.ok) { localStorage.removeItem("sln_token"); token = ""; return; }
    const d = await r.json();
    myId = d.member?.id;
    myName = d.member?.name || d.member?.email?.split("@")[0] || "あなた";
    myMemberType = d.member?.member_type || "";
  } catch {
    return; // ネットワークエラー時もゲートを維持
  }
  if (!token) return; // 認証失敗でtoken=""になった場合はゲートを維持
  document.getElementById("gate").style.display = "none";
  document.getElementById("input-box").disabled = false;
  await loadMessages();
  connectSSE();
  requestNotificationPermission();
  loadPinnedBar();
}

// ── MESSAGES ─────────────────────────────────────────────────────────
let oldestId = null;
let loadingMore = false;

async function loadMessages(before) {
  try {
    const url = before ? `${API}/api/soluna/community/messages?before=${before}` : `${API}/api/soluna/community/messages`;
    const r = await fetch(url, { headers:{ Authorization:`Bearer ${token}` } });
    const d = await r.json();
    const msgs = d.messages || [];
    if (msgs.length === 0 && !before) { return; }
    if (!before) document.getElementById("empty").style.display = "none";
    const container = document.getElementById("msgs");
    const typing = document.getElementById("typing");
    if (before) {
      // prepend (load older)
      const oldScroll = container.scrollHeight;
      const frag = document.createDocumentFragment();
      renderMsgList(msgs, frag);
      container.insertBefore(frag, container.firstChild);
      container.scrollTop = container.scrollHeight - oldScroll;
    } else {
      renderMsgList(msgs, container, true);
      scrollToBottom(false);
    }
    if (msgs.length) oldestId = msgs[0].id;
  } catch(e) { console.error(e); }
}

// Render a list of messages adding to container, respecting grouping
let lastRendered = null; // { member_id, display_name, ts }

function renderMsgList(msgs, container, append) {
  let prev = append ? lastRendered : null;
  msgs.forEach((msg, i) => {
    const el = buildMsgEl(msg, prev);
    if (typeof container.appendChild === "function") container.appendChild(el);
    else container.insertBefore(el, container.firstChild);
    rendered.add(msg.id);
    prev = { member_id: msg.member_id, display_name: msg.display_name, ts: new Date(msg.created_at) };
  });
  if (append) lastRendered = prev;
}

function shouldGroup(msg, prev) {
  if (!prev) return false;
  if (prev.member_id !== msg.member_id) return false;
  const diff = (new Date(msg.created_at) - prev.ts) / 1000;
  return diff < 300; // 5min
}

function buildMsgEl(msg, prev) {
  const isMine = msg.member_id === myId && !msg.is_ai;
  const isAI = !!msg.is_ai;
  const grouped = shouldGroup(msg, prev);
  const initial = isAI ? "S" : (msg.display_name || "?")[0].toUpperCase();
  const nameClass = isAI ? "ai-s" : { admin:"admin-s", founder:"founder-s", owner:"owner-s" }[msg.member_type] || "";
  const time = formatTime(msg.created_at);

  const group = document.createElement("div");
  group.className = `msg-group${isMine ? " mine" : ""}`;
  group.dataset.groupId = msg.member_id;

  const row = document.createElement("div");
  row.className = `msg-row${grouped ? " compact" : ""}`;
  row.dataset.msgId = msg.id;

  // Avatar
  const av = document.createElement("div");
  av.className = `avatar${isAI ? " ai" : ""}${grouped ? " placeholder" : ""}`;
  av.textContent = grouped ? "" : initial;

  // Content
  const content = document.createElement("div");
  content.className = "msg-content";

  if (!grouped) {
    const meta = document.createElement("div");
    meta.className = "msg-meta";
    meta.innerHTML = `<span class="msg-sender ${nameClass}">${escHtml(msg.display_name)}${isAI ? " ✦" : ""}</span><span class="msg-time">${time}</span>`;
    content.appendChild(meta);
  }

  // Bubble
  const bubble = document.createElement("div");
  bubble.className = `bubble${isAI ? " ai" : ""}`;

  // Reply preview
  if (msg.reply_preview) {
    try {
      const rp = JSON.parse(msg.reply_preview);
      const rpEl = document.createElement("div");
      rpEl.className = "reply-preview";
      rpEl.innerHTML = `<div><div class="rp-name">${escHtml(rp.name)}</div><div class="rp-text">${escHtml(rp.text)}</div></div>`;
      rpEl.onclick = () => scrollToMsg(msg.reply_to_id);
      bubble.appendChild(rpEl);
    } catch {}
  }

  // Image
  if (msg.image_url) {
    const img = document.createElement("img");
    img.className = "bubble-img";
    img.src = msg.image_url;
    img.alt = "画像";
    img.loading = "lazy";
    img.onclick = () => openLightbox(msg.image_url);
    bubble.appendChild(img);
  }

  // Text
  if (msg.message) {
    const txt = document.createElement("span");
    txt.innerHTML = linkify(escHtml(msg.message));
    bubble.appendChild(txt);
  }

  content.appendChild(bubble);

  // Reactions placeholder
  const reactsEl = document.createElement("div");
  reactsEl.className = "reactions";
  reactsEl.id = `r-${msg.id}`;
  content.appendChild(reactsEl);

  row.appendChild(av);
  row.appendChild(content);

  // Hover action bar
  const actBar = document.createElement("div");
  actBar.className = "msg-actions";
  actBar.innerHTML = `
    <button class="act-btn" onclick="openReactSheet(${msg.id})" title="リアクション">😊</button>
    <button class="act-btn" onclick="setReply(${msg.id},'${escAttr(msg.display_name)}','${escAttr((msg.message||'').slice(0,80))}')" title="返信">
      <svg viewBox="0 0 24 24"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 00-4-4H4"/></svg>
    </button>
    ${isMine || myMemberType === "admin" ? `<button class="act-btn del" onclick="deleteMsg(${msg.id})" title="削除">
      <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
    </button>` : ""}
    ${myMemberType === "admin" ? `<button class="act-btn" onclick="pinMsg(${msg.id},${msg.pinned?0:1})" title="${msg.pinned?'ピン解除':'ピン留め'}" style="font-size:13px">${msg.pinned?'📌':'📍'}</button>` : ""}`;
  row.appendChild(actBar);

  group.appendChild(row);
  return group;
}

// ── SSE ───────────────────────────────────────────────────────────────
function connectSSE() {
  if (es) es.close();
  es = new EventSource(`${API}/api/soluna/community/stream?token=${encodeURIComponent(token)}`);
  es.onmessage = (e) => {
    try {
      const p = JSON.parse(e.data);
      if (p.type === "online") {
        document.getElementById("online-count").textContent = `${p.count}人オンライン`;
      } else if (p.type === "reaction") {
        applyReactions(p.message_id, p.reactions);
      } else if (p.type === "delete") {
        handleDelete(p.message_id);
      } else if ((p.type === "message" || p.id) && !rendered.has(p.id)) {
        if (p.is_ai) document.getElementById("typing").classList.remove("show");
        appendMsg(p, true);
      }
    } catch {}
  };
  es.onerror = () => {
    document.getElementById("typing").classList.remove("show");
    setTimeout(connectSSE, 3000);
  };
}

function appendMsg(msg, animate) {
  const container = document.getElementById("msgs");
  document.getElementById("empty").style.display = "none";
  const el = buildMsgEl(msg, lastRendered);
  if (!animate) el.style.animation = "none";
  container.appendChild(el);
  rendered.add(msg.id);
  lastRendered = { member_id: msg.member_id, display_name: msg.display_name, ts: new Date(msg.created_at) };

  const atBottom = isNearBottom();
  if (animate && atBottom) {
    scrollToBottom(true);
  } else if (animate && !atBottom && msg.member_id !== myId) {
    unreadCount++;
    const fab = document.getElementById("scroll-fab");
    fab.classList.add("show", "has-unread");
    document.getElementById("fab-badge").textContent = unreadCount;
    if (!document.hasFocus()) notifyMsg(msg.display_name, msg.message || "画像");
  }
}

// ── SCROLL ────────────────────────────────────────────────────────────
const msgsEl = document.getElementById("msgs");
function isNearBottom() {
  return msgsEl.scrollHeight - msgsEl.scrollTop - msgsEl.clientHeight < 120;
}
function scrollToBottom(smooth) {
  unreadCount = 0;
  const fab = document.getElementById("scroll-fab");
  fab.classList.remove("show", "has-unread");
  msgsEl.scrollTo({ top: msgsEl.scrollHeight, behavior: smooth ? "smooth" : "auto" });
}
function scrollToMsg(id) {
  const el = document.querySelector(`[data-msg-id="${id}"]`);
  if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
}
msgsEl.addEventListener("scroll", () => {
  const atBottom = isNearBottom();
  const fab = document.getElementById("scroll-fab");
  if (atBottom) { fab.classList.remove("show","has-unread"); unreadCount = 0; }
  // Load more when scrolled near top
  if (msgsEl.scrollTop < 80 && oldestId && !loadingMore) {
    loadingMore = true;
    loadMessages(oldestId).finally(() => { loadingMore = false; });
  }
});

// ── SEND ──────────────────────────────────────────────────────────────
async function sendMessage() {
  if (sending) return;
  const box = document.getElementById("input-box");
  const text = box.value.trim();
  if (!text && !pendingImage) return;
  sending = true;
  const origText = text;
  box.value = ""; box.style.height = "";
  document.getElementById("send-btn").disabled = true;
  document.getElementById("empty").style.display = "none";

  const aiHint = /AI|ソル|sol|どう|教え|知りたい|？|\?/i.test(text);
  if (aiHint) setTimeout(() => { document.getElementById("typing").classList.add("show"); scrollToBottom(true); }, 700);

  const body = { message: text };
  if (pendingImage) body.image_url = pendingImage;
  if (replyTo) { body.reply_to_id = replyTo.id; }
  clearImage(); cancelReply();

  try {
    const r = await fetch(`${API}/api/soluna/community/message`, {
      method:"POST", headers:{"Content-Type":"application/json", Authorization:`Bearer ${token}`},
      body: JSON.stringify(body)
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error);
    if (d.message && !rendered.has(d.message.id)) {
      appendMsg(d.message, true);
    }
  } catch(e) {
    box.value = origText;
    handleInput(box);
    showToast("送信できませんでした");
  } finally {
    sending = false;
    document.getElementById("send-btn").disabled = !box.value.trim() && !pendingImage;
    box.focus();
  }
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey && !e.isComposing) {
    e.preventDefault();
    sendMessage();
  }
}

function handleInput(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 120) + "px";
  document.getElementById("send-btn").disabled = !el.value.trim() && !pendingImage;
}

// ── IMAGE ─────────────────────────────────────────────────────────────
function triggerImagePick() { document.getElementById("file-input").click(); }

function handleFileSelect(e) {
  const file = e.target.files?.[0];
  if (!file) return;
  e.target.value = "";
  readImageFile(file);
}

function handlePaste(e) {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith("image/")) {
      e.preventDefault();
      readImageFile(item.getAsFile());
      return;
    }
  }
}

function readImageFile(file) {
  if (!file || file.size > 3 * 1024 * 1024) { showToast("3MB以下の画像を選択してください"); return; }
  const reader = new FileReader();
  reader.onload = (e) => {
    pendingImage = e.target.result;
    document.getElementById("img-preview").src = pendingImage;
    document.getElementById("img-strip").classList.add("show");
    document.getElementById("send-btn").disabled = false;
  };
  reader.readAsDataURL(file);
}

function clearImage() {
  pendingImage = null;
  document.getElementById("img-strip").classList.remove("show");
  document.getElementById("img-preview").src = "";
}

// ── REPLY ─────────────────────────────────────────────────────────────
function setReply(id, name, text) {
  replyTo = { id, name, text };
  document.getElementById("rs-name").textContent = name;
  document.getElementById("rs-text").textContent = text;
  document.getElementById("reply-strip").classList.add("show");
  document.getElementById("input-box").focus();
}

function cancelReply() {
  replyTo = null;
  document.getElementById("reply-strip").classList.remove("show");
}

// ── REACTIONS ─────────────────────────────────────────────────────────
let reactMsgId = null;

function openReactSheet(msgId) {
  reactMsgId = msgId;
  const sheet = document.getElementById("react-sheet");
  const overlay = document.getElementById("react-overlay");
  document.getElementById("rs-emojis").innerHTML = EMOJIS.map(e =>
    `<button class="rs-emoji-btn" onclick="sendReaction(${msgId},'${e}');closeReactSheet()">${e}</button>`
  ).join("");
  overlay.classList.add("show");
  sheet.classList.add("show");
}

function closeReactSheet() {
  document.getElementById("react-sheet").classList.remove("show");
  document.getElementById("react-overlay").classList.remove("show");
}

async function sendReaction(msgId, emoji) {
  try {
    const r = await fetch(`${API}/api/soluna/community/react`, {
      method:"POST", headers:{"Content-Type":"application/json", Authorization:`Bearer ${token}`},
      body: JSON.stringify({ message_id: msgId, emoji })
    });
    const d = await r.json();
    if (d.reactions) applyReactions(msgId, d.reactions);
  } catch {}
}

function applyReactions(msgId, data) {
  reactions.set(msgId, data);
  const el = document.getElementById(`r-${msgId}`);
  if (!el) return;
  el.innerHTML = "";
  for (const [emoji, info] of Object.entries(data)) {
    if (!info.count) continue;
    const pill = document.createElement("button");
    pill.className = `r-pill${info.mine ? " mine" : ""}`;
    pill.innerHTML = `${emoji}<span class="cnt">${info.count}</span>`;
    pill.onclick = () => sendReaction(msgId, emoji);
    el.appendChild(pill);
  }
}

// ── DELETE ────────────────────────────────────────────────────────────
async function pinMsg(id, pinned) {
  try {
    const r = await fetch(`${API}/api/soluna/community/pin/${id}`, {
      method:"PATCH", headers:{ Authorization:`Bearer ${token}`, "Content-Type":"application/json" },
      body: JSON.stringify({ pinned })
    });
    if (!r.ok) throw new Error("ピン留め失敗");
    showToast(pinned ? "📌 ピン留めしました" : "ピン解除しました");
    // reload pinned bar if exists
    if (document.getElementById("pinned-bar")) loadPinnedBar();
  } catch(e) { showToast(e.message); }
}

async function loadPinnedBar() {
  try {
    const pins = await fetch(`${API}/api/soluna/community/pinned`).then(r=>r.json());
    const bar = document.getElementById("pinned-bar");
    if (!bar) return;
    if (!pins.length) { bar.style.display="none"; return; }
    bar.style.display="";
    bar.innerHTML = pins.map(p =>
      `<div style="display:flex;gap:6px;align-items:center;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04);">
        <span style="font-size:11px;color:#c8a455;flex-shrink:0">📌</span>
        <span style="font-size:11px;color:#ccc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml((p.message||'').slice(0,80))}</span>
        <span style="font-size:10px;color:#555;flex-shrink:0">${p.display_name}</span>
      </div>`
    ).join('');
  } catch(e) {}
}

async function deleteMsg(id) {
  if (!confirm("このメッセージを削除しますか？")) return;
  try {
    const r = await fetch(`${API}/api/soluna/community/message/${id}`, {
      method:"DELETE", headers:{ Authorization:`Bearer ${token}` }
    });
    if (!r.ok) { const d = await r.json(); throw new Error(d.error); }
    handleDelete(id);
  } catch(e) { showToast(e.message || "削除できませんでした"); }
}

function handleDelete(id) {
  const row = document.querySelector(`[data-msg-id="${id}"]`);
  if (!row) return;
  const bubble = row.querySelector(".bubble");
  if (bubble) {
    bubble.innerHTML = `<span style="color:var(--muted);font-size:12px;font-style:italic">削除されました</span>`;
    bubble.style.opacity = "0.5";
  }
  const bar = row.querySelector(".msg-actions");
  if (bar) bar.remove();
}

// ── LIGHTBOX ──────────────────────────────────────────────────────────
function openLightbox(url) {
  document.getElementById("lightbox-img").src = url;
  document.getElementById("lightbox").classList.add("show");
}
function closeLightbox() { document.getElementById("lightbox").classList.remove("show"); }

// ── NOTIFICATIONS ─────────────────────────────────────────────────────
function notifyMsg(sender, text) {
  if (document.hasFocus()) return;
  if (Notification.permission === "granted") {
    new Notification(`SOLUNA Chat — ${sender}`, { body: text.slice(0,80), icon:"/img/kumaushi_aerial_dawn.webp" });
  }
}
function requestNotificationPermission() {
  if (Notification.permission === "default") Notification.requestPermission();
}

// ── TOAST ─────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2500);
}

// ── UTILS ─────────────────────────────────────────────────────────────
function formatTime(iso) {
  const d = new Date(iso);
  const now = new Date();
  const today = d.toDateString() === now.toDateString();
  if (today) return d.toLocaleTimeString("ja-JP", { hour:"2-digit", minute:"2-digit" });
  return d.toLocaleDateString("ja-JP", { month:"numeric", day:"numeric" }) + " " +
         d.toLocaleTimeString("ja-JP", { hour:"2-digit", minute:"2-digit" });
}

function escHtml(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/\n/g,"<br>");
}
function escAttr(s) {
  return String(s||"").replace(/'/g,"&#39;").replace(/"/g,"&quot;").replace(/\n/g," ");
}
function linkify(s) {
  return s.replace(/(https?:\/\/[^\s<>"]+)/g, '<a href="$1" target="_blank" rel="noopener" style="color:var(--gold);text-underline-offset:2px">$1</a>');
}

// Long-press for react sheet on mobile
let lpTimer;
document.addEventListener("touchstart", (e) => {
  const row = e.target.closest(".msg-row");
  if (!row) return;
  const id = Number(row.dataset.msgId);
  if (!id) return;
  lpTimer = setTimeout(() => { openReactSheet(id); }, 550);
}, { passive: true });
document.addEventListener("touchend", () => clearTimeout(lpTimer), { passive: true });
document.addEventListener("touchmove", () => clearTimeout(lpTimer), { passive: true });

// Keyboard close overlay
document.addEventListener("keydown", e => {
  if (e.key === "Escape") { cancelReply(); closeReactSheet(); closeLightbox(); }
});

// ── BOOT ─────────────────────────────────────────────────────────────
document.getElementById("send-btn").disabled = true;
document.getElementById("input-box").disabled = true;
if (token) initChat();
</script>
<script defer src="/js/sln-chat-btn.js"></script>
<script defer src="/js/sln-desktop.js"></script>
<script src="/js/dc.js"></script>
