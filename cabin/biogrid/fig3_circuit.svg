<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560" font-family="'Helvetica Neue',Arial,sans-serif">
  <rect width="900" height="560" fill="white"/>

  <text x="450" y="34" text-anchor="middle" font-size="16" font-weight="bold">【図3】エネルギーハーベスト回路図</text>
  <text x="450" y="53" text-anchor="middle" font-size="11" fill="#555">Fig.3  Energy Harvesting Circuit — MFC + Solar Hybrid</text>

  <!-- MFC source (left) -->
  <rect x="30" y="120" width="110" height="120" rx="8" fill="#2a5a2a" stroke="#1a3a1a" stroke-width="2"/>
  <text x="85" y="152" text-anchor="middle" font-size="11" fill="white" font-weight="bold">MFC</text>
  <text x="85" y="168" text-anchor="middle" font-size="9" fill="#90e890">0.3〜0.8V</text>
  <text x="85" y="184" text-anchor="middle" font-size="9" fill="#90e890">1〜40mW</text>
  <!-- Battery symbol -->
  <line x1="70" y1="200" x2="100" y2="200" stroke="#90e890" stroke-width="3"/>
  <line x1="76" y1="208" x2="94" y2="208" stroke="#90e890" stroke-width="1.5"/>
  <line x1="70" y1="216" x2="100" y2="216" stroke="#90e890" stroke-width="3"/>
  <line x1="76" y1="224" x2="94" y2="224" stroke="#90e890" stroke-width="1.5"/>
  <text x="85" y="238" text-anchor="middle" font-size="8" fill="#70c870">Vmfc</text>

  <!-- Solar source (left, below) -->
  <rect x="30" y="300" width="110" height="100" rx="8" fill="#1a3a6b" stroke="#0d2040" stroke-width="2"/>
  <text x="85" y="332" text-anchor="middle" font-size="11" fill="#7fb8ff" font-weight="bold">SOLAR</text>
  <text x="85" y="350" text-anchor="middle" font-size="9" fill="#5a90df">5〜30W</text>
  <text x="85" y="366" text-anchor="middle" font-size="9" fill="#5a90df">薄膜パネル</text>
  <!-- Diode symbol -->
  <polygon points="70,384 100,384 85,396" fill="#5a90df" stroke="#5a90df" stroke-width="1"/>
  <line x1="70" y1="396" x2="100" y2="396" stroke="#5a90df" stroke-width="1.5"/>

  <!-- BQ25504 block -->
  <rect x="200" y="90" width="160" height="180" rx="8" fill="#3a1a5a" stroke="#200a40" stroke-width="2.5"/>
  <text x="280" y="114" text-anchor="middle" font-size="13" fill="white" font-weight="bold">BQ25504</text>
  <text x="280" y="130" text-anchor="middle" font-size="9" fill="#c090ff">Energy Harvesting IC</text>
  <!-- internal blocks -->
  <rect x="212" y="140" width="60" height="32" rx="3" fill="#5a2a8a"/>
  <text x="242" y="156" text-anchor="middle" font-size="8" fill="white">MPPT</text>
  <text x="242" y="168" text-anchor="middle" font-size="7" fill="#d0a0ff">最大電力追従</text>
  <rect x="286" y="140" width="62" height="32" rx="3" fill="#5a2a8a"/>
  <text x="317" y="156" text-anchor="middle" font-size="8" fill="white">Boost</text>
  <text x="317" y="168" text-anchor="middle" font-size="7" fill="#d0a0ff">昇圧DC/DC</text>
  <rect x="212" y="182" width="60" height="32" rx="3" fill="#5a2a8a"/>
  <text x="242" y="197" text-anchor="middle" font-size="8" fill="white">VBAT_OK</text>
  <text x="242" y="208" text-anchor="middle" font-size="7" fill="#d0a0ff">電圧監視</text>
  <rect x="286" y="182" width="62" height="32" rx="3" fill="#5a2a8a"/>
  <text x="317" y="197" text-anchor="middle" font-size="8" fill="white">Protect</text>
  <text x="317" y="208" text-anchor="middle" font-size="7" fill="#d0a0ff">過充電保護</text>
  <text x="280" y="250" text-anchor="middle" font-size="9" fill="#a070df">Vin min: 50mV</text>
  <text x="280" y="264" text-anchor="middle" font-size="9" fill="#a070df">Vout: 3.0〜3.6V</text>

  <!-- Supercapacitor -->
  <rect x="420" y="90" width="110" height="100" rx="8" fill="#4a3000" stroke="#2a1800" stroke-width="2"/>
  <text x="475" y="118" text-anchor="middle" font-size="11" fill="#f0c040" font-weight="bold">スーパー</text>
  <text x="475" y="134" text-anchor="middle" font-size="11" fill="#f0c040" font-weight="bold">キャパシタ</text>
  <text x="475" y="152" text-anchor="middle" font-size="10" fill="#d0a020">10F / 5.5V</text>
  <!-- Capacitor symbol -->
  <line x1="455" y1="165" x2="495" y2="165" stroke="#f0c040" stroke-width="3"/>
  <line x1="455" y1="173" x2="495" y2="173" stroke="#f0c040" stroke-width="1.5"/>
  <line x1="455" y1="180" x2="495" y2="180" stroke="#f0c040" stroke-width="3"/>
  <text x="475" y="195" text-anchor="middle" font-size="8" fill="#c0a020">蓄電バッファ</text>

  <!-- MPPT for Solar -->
  <rect x="200" y="290" width="160" height="100" rx="8" fill="#0d3060" stroke="#082040" stroke-width="2"/>
  <text x="280" y="318" text-anchor="middle" font-size="12" fill="#7fb8ff" font-weight="bold">MPPT</text>
  <text x="280" y="334" text-anchor="middle" font-size="9" fill="#5a90df">Solar Controller</text>
  <rect x="212" y="345" width="60" height="28" rx="3" fill="#1a4a8a"/>
  <text x="242" y="361" text-anchor="middle" font-size="8" fill="white">5A MPPT</text>
  <rect x="286" y="345" width="62" height="28" rx="3" fill="#1a4a8a"/>
  <text x="317" y="361" text-anchor="middle" font-size="8" fill="white">PWM Out</text>
  <text x="280" y="384" text-anchor="middle" font-size="9" fill="#4a80cf">24V → PWM制御</text>

  <!-- Fan driver -->
  <rect x="420" y="270" width="110" height="120" rx="8" fill="#3a0000" stroke="#200000" stroke-width="2"/>
  <text x="475" y="298" text-anchor="middle" font-size="11" fill="#ff8080" font-weight="bold">FAN</text>
  <text x="475" y="314" text-anchor="middle" font-size="11" fill="#ff8080" font-weight="bold">DRIVER</text>
  <text x="475" y="332" text-anchor="middle" font-size="9" fill="#ffa0a0">IRL540N MOSFET</text>
  <text x="475" y="350" text-anchor="middle" font-size="9" fill="#ff8080">30W / 24V</text>
  <!-- MOSFET symbol -->
  <rect x="450" y="358" width="50" height="20" rx="3" fill="#5a0000"/>
  <text x="475" y="372" text-anchor="middle" font-size="8" fill="#ffa0a0">PWM duty</text>

  <!-- nRF52840 block -->
  <rect x="600" y="80" width="180" height="200" rx="8" fill="#1a1a4a" stroke="#0a0a2a" stroke-width="2.5"/>
  <text x="690" y="108" text-anchor="middle" font-size="13" fill="white" font-weight="bold">nRF52840</text>
  <text x="690" y="124" text-anchor="middle" font-size="9" fill="#8080ff">SoC + BLE5 + NFC</text>
  <!-- sub blocks -->
  <rect x="614" y="134" width="72" height="28" rx="3" fill="#2a2a8a"/>
  <text x="650" y="148" text-anchor="middle" font-size="8" fill="white">Cortex-M4</text>
  <text x="650" y="158" text-anchor="middle" font-size="7" fill="#a0a0ff">64MHz MCU</text>
  <rect x="698" y="134" width="70" height="28" rx="3" fill="#2a2a8a"/>
  <text x="733" y="148" text-anchor="middle" font-size="8" fill="white">BLE 5.0</text>
  <text x="733" y="158" text-anchor="middle" font-size="7" fill="#a0a0ff">2.4GHz radio</text>
  <rect x="614" y="172" width="72" height="28" rx="3" fill="#2a2a8a"/>
  <text x="650" y="186" text-anchor="middle" font-size="8" fill="white">NFC-A</text>
  <text x="650" y="196" text-anchor="middle" font-size="7" fill="#a0a0ff">13.56MHz</text>
  <rect x="698" y="172" width="70" height="28" rx="3" fill="#2a2a8a"/>
  <text x="733" y="186" text-anchor="middle" font-size="8" fill="white">ADC 12bit</text>
  <text x="733" y="196" text-anchor="middle" font-size="7" fill="#a0a0ff">MFC測定</text>
  <rect x="614" y="210" width="72" height="28" rx="3" fill="#2a2a8a"/>
  <text x="650" y="224" text-anchor="middle" font-size="8" fill="white">Deep Sleep</text>
  <text x="650" y="234" text-anchor="middle" font-size="7" fill="#a0a0ff">2 µA</text>
  <rect x="698" y="210" width="70" height="28" rx="3" fill="#2a2a8a"/>
  <text x="733" y="224" text-anchor="middle" font-size="8" fill="white">I2C / SPI</text>
  <text x="733" y="234" text-anchor="middle" font-size="7" fill="#a0a0ff">センサーIF</text>
  <text x="690" y="268" text-anchor="middle" font-size="9" fill="#6060ef">消費: 2µA(sleep) / 7mA(TX)</text>

  <!-- Sensors -->
  <rect x="620" y="310" width="80" height="60" rx="6" fill="#1a3a3a" stroke="#0a2020" stroke-width="1.5"/>
  <text x="660" y="334" text-anchor="middle" font-size="9" fill="#40d0d0" font-weight="bold">SCD40</text>
  <text x="660" y="348" text-anchor="middle" font-size="8" fill="#20b0b0">CO₂ センサー</text>
  <text x="660" y="362" text-anchor="middle" font-size="7" fill="#20a0a0">3.5mW (測定時)</text>

  <rect x="720" y="310" width="72" height="60" rx="6" fill="#1a3a3a" stroke="#0a2020" stroke-width="1.5"/>
  <text x="756" y="334" text-anchor="middle" font-size="9" fill="#40d0d0" font-weight="bold">AHT20</text>
  <text x="756" y="348" text-anchor="middle" font-size="8" fill="#20b0b0">温湿度</text>
  <text x="756" y="362" text-anchor="middle" font-size="7" fill="#20a0a0">0.5mW</text>

  <!-- Fan load -->
  <rect x="620" y="400" width="160" height="60" rx="6" fill="#3a0000" stroke="#200000" stroke-width="1.5"/>
  <text x="700" y="424" text-anchor="middle" font-size="11" fill="#ff8080" font-weight="bold">換気ファン</text>
  <text x="700" y="442" text-anchor="middle" font-size="9" fill="#ffa0a0">30W / 24V DC</text>
  <text x="700" y="456" text-anchor="middle" font-size="8" fill="#ff6060">200m³/h</text>

  <!-- Wires -->
  <!-- MFC to BQ25504 -->
  <line x1="140" y1="180" x2="198" y2="180" stroke="#80e080" stroke-width="2.5" marker-end="url(#w1)"/>
  <text x="168" y="172" text-anchor="middle" font-size="8" fill="#40a040">0.5V</text>

  <!-- Solar to MPPT -->
  <line x1="140" y1="350" x2="198" y2="350" stroke="#4a90d9" stroke-width="2.5" marker-end="url(#w2)"/>
  <text x="168" y="342" text-anchor="middle" font-size="8" fill="#1a60a0">18V</text>

  <!-- BQ25504 to Supercap -->
  <line x1="360" y1="165" x2="418" y2="145" stroke="#f0c040" stroke-width="2.5" marker-end="url(#w3)"/>
  <text x="392" y="145" text-anchor="middle" font-size="8" fill="#c09020">3.3V</text>

  <!-- Supercap to nRF52840 -->
  <line x1="530" y1="140" x2="598" y2="160" stroke="#f0c040" stroke-width="2.5" marker-end="url(#w4)"/>
  <text x="568" y="140" text-anchor="middle" font-size="8" fill="#c09020">3.3V</text>

  <!-- nRF52840 to sensors -->
  <line x1="650" y1="280" x2="650" y2="308" stroke="#40d0d0" stroke-width="1.5" marker-end="url(#w5)"/>
  <line x1="740" y1="280" x2="750" y2="308" stroke="#40d0d0" stroke-width="1.5" marker-end="url(#w5)"/>

  <!-- nRF52840 to fan driver -->
  <path d="M 690 280 L 690 290 L 475 290 L 475 268" fill="none" stroke="#ff6060" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#w6)"/>
  <text x="600" y="286" text-anchor="middle" font-size="8" fill="#cc4040">PWM 制御信号</text>

  <!-- MPPT to fan driver -->
  <line x1="420" y1="340" x2="420" y2="310" stroke="#4a90d9" stroke-width="2.5" marker-end="url(#w7)"/>

  <!-- Fan driver to Fan load -->
  <path d="M 475 390 L 475 470 L 618 470 L 618 430" fill="none" stroke="#ff4040" stroke-width="2.5" marker-end="url(#w8)"/>
  <text x="548" y="478" text-anchor="middle" font-size="8" fill="#cc0000">24V PWM</text>

  <!-- BLE signal -->
  <text x="840" y="185" text-anchor="middle" font-size="10" fill="#8060ff">))))</text>
  <text x="840" y="202" text-anchor="middle" font-size="9" fill="#8060ff">BLE</text>
  <text x="840" y="215" text-anchor="middle" font-size="8" fill="#6040df">2.4GHz</text>
  <line x1="782" y1="196" x2="820" y2="196" stroke="#8060ff" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- NFC signal -->
  <text x="840" y="240" text-anchor="middle" font-size="10" fill="#40a0ff">≋≋≋</text>
  <text x="840" y="256" text-anchor="middle" font-size="9" fill="#40a0ff">NFC</text>
  <text x="840" y="268" text-anchor="middle" font-size="8" fill="#2080df">13.56MHz</text>
  <line x1="782" y1="252" x2="820" y2="252" stroke="#40a0ff" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Power budget annotation -->
  <rect x="28" y="430" width="260" height="110" rx="6" fill="#f0f8f0" stroke="#2a7a2a" stroke-width="1"/>
  <text x="158" y="450" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5a1a">電力収支（MFC最低出力時）</text>
  <text x="40" y="468" font-size="9" fill="#2a6a2a">MFC 出力:        1.0 mW</text>
  <text x="40" y="484" font-size="9" fill="#2a6a2a">nRF52840 平均:  -0.3 mW</text>
  <text x="40" y="500" font-size="9" fill="#2a6a2a">SCD40 平均:     -0.3 mW</text>
  <text x="40" y="516" font-size="9" fill="#2a6a2a">AHT20 平均:     -0.1 mW</text>
  <line x1="40" y1="522" x2="275" y2="522" stroke="#2a7a2a" stroke-width="1"/>
  <text x="40" y="534" font-size="10" fill="#1a5a1a" font-weight="bold">余剰:             +0.3 mW ✓</text>

  <defs>
    <marker id="w1" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#80e080"/></marker>
    <marker id="w2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#4a90d9"/></marker>
    <marker id="w3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#f0c040"/></marker>
    <marker id="w4" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#f0c040"/></marker>
    <marker id="w5" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#40d0d0"/></marker>
    <marker id="w6" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#cc4040"/></marker>
    <marker id="w7" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#4a90d9"/></marker>
    <marker id="w8" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#ff4040"/></marker>
  </defs>

  <text x="450" y="546" text-anchor="middle" font-size="10" fill="#888">Fig. 3 — 特許出願用図面　©2026 濱田優貴</text>
</svg>
