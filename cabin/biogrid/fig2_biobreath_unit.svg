<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 640" width="900" height="640" font-family="'Helvetica Neue',Arial,sans-serif">
  <rect width="900" height="640" fill="white"/>

  <text x="450" y="36" text-anchor="middle" font-size="16" font-weight="bold">【図2】BioBreath 壁掛け換気ユニット 内部構造図</text>
  <text x="450" y="55" text-anchor="middle" font-size="11" fill="#555">Fig.2  BioBreath Wall Unit — Internal Structure</text>

  <!-- Main unit outline -->
  <rect x="220" y="76" width="380" height="460" rx="10" fill="#f5f5f2" stroke="#888" stroke-width="2.5"/>

  <!-- Dimension: 600mm height -->
  <line x1="608" y1="76" x2="608" y2="536" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="602" y1="76" x2="614" y2="76" stroke="#999" stroke-width="1"/>
  <line x1="602" y1="536" x2="614" y2="536" stroke="#999" stroke-width="1"/>
  <text x="628" y="314" text-anchor="middle" font-size="10" fill="#555" transform="rotate(90,628,314)">600 mm</text>

  <!-- Dimension: 400mm width -->
  <line x1="220" y1="62" x2="600" y2="62" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="220" y1="56" x2="220" y2="68" stroke="#999" stroke-width="1"/>
  <line x1="600" y1="56" x2="600" y2="68" stroke="#999" stroke-width="1"/>
  <text x="410" y="58" text-anchor="middle" font-size="10" fill="#555">400 mm</text>

  <!-- Solar panel (top) -->
  <rect x="228" y="84" width="364" height="72" rx="4" fill="#1a3a6b" stroke="#0d2040" stroke-width="1.5"/>
  <!-- solar cells grid -->
  <line x1="283" y1="84" x2="283" y2="156" stroke="#2a5a9b" stroke-width="0.8"/>
  <line x1="338" y1="84" x2="338" y2="156" stroke="#2a5a9b" stroke-width="0.8"/>
  <line x1="393" y1="84" x2="393" y2="156" stroke="#2a5a9b" stroke-width="0.8"/>
  <line x1="448" y1="84" x2="448" y2="156" stroke="#2a5a9b" stroke-width="0.8"/>
  <line x1="503" y1="84" x2="503" y2="156" stroke="#2a5a9b" stroke-width="0.8"/>
  <line x1="558" y1="84" x2="558" y2="156" stroke="#2a5a9b" stroke-width="0.8"/>
  <line x1="228" y1="120" x2="592" y2="120" stroke="#2a5a9b" stroke-width="0.8"/>
  <text x="410" y="108" text-anchor="middle" font-size="12" fill="#7fb8ff" font-weight="bold">薄膜ソーラーパネル</text>
  <text x="410" y="126" text-anchor="middle" font-size="10" fill="#5a90df">Thin-film Solar Module　250×400mm　30W</text>
  <text x="410" y="146" text-anchor="middle" font-size="9" fill="#4a80cf">→ 換気ファン主電源</text>

  <!-- Intake section -->
  <rect x="228" y="164" width="160" height="100" rx="4" fill="#e8f4ff" stroke="#4a90d9" stroke-width="1.5"/>
  <!-- intake louvers -->
  <line x1="238" y1="180" x2="378" y2="180" stroke="#4a90d9" stroke-width="2"/>
  <line x1="238" y1="194" x2="378" y2="194" stroke="#4a90d9" stroke-width="2"/>
  <line x1="238" y1="208" x2="378" y2="208" stroke="#4a90d9" stroke-width="2"/>
  <line x1="238" y1="222" x2="378" y2="222" stroke="#4a90d9" stroke-width="2"/>
  <line x1="238" y1="236" x2="378" y2="236" stroke="#4a90d9" stroke-width="2"/>
  <text x="308" y="255" text-anchor="middle" font-size="10" fill="#1a4a80" font-weight="bold">吸気口</text>

  <!-- HEPA filter -->
  <rect x="228" y="272" width="160" height="80" rx="4" fill="#fff0e0" stroke="#e8a020" stroke-width="2"/>
  <text x="308" y="306" text-anchor="middle" font-size="12" fill="#8b5000" font-weight="bold">HEPA</text>
  <text x="308" y="324" text-anchor="middle" font-size="9" fill="#8b5000">フィルター H13</text>
  <text x="308" y="342" text-anchor="middle" font-size="8" fill="#b87020">捕集: 花粉・VOC・微生物</text>

  <!-- Arrow from HEPA to MFC -->
  <path d="M 308 352 L 308 370 L 260 370 L 260 414" fill="none" stroke="#e8a020" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a1)"/>
  <text x="230" y="390" text-anchor="middle" font-size="8" fill="#c07800">有機物</text>
  <text x="230" y="402" text-anchor="middle" font-size="8" fill="#c07800">→ 燃料</text>

  <!-- Heat exchanger (right column) -->
  <rect x="432" y="164" width="160" height="188" rx="4" fill="#e8ffe8" stroke="#2a8a2a" stroke-width="1.5"/>
  <!-- HEX lines -->
  <line x1="442" y1="180" x2="582" y2="180" stroke="#2a8a2a" stroke-width="1"/>
  <line x1="442" y1="196" x2="582" y2="196" stroke="#2a8a2a" stroke-width="1"/>
  <line x1="442" y1="212" x2="582" y2="212" stroke="#2a8a2a" stroke-width="1"/>
  <line x1="442" y1="228" x2="582" y2="228" stroke="#2a8a2a" stroke-width="1"/>
  <line x1="442" y1="244" x2="582" y2="244" stroke="#2a8a2a" stroke-width="1"/>
  <line x1="442" y1="260" x2="582" y2="260" stroke="#2a8a2a" stroke-width="1"/>
  <line x1="462" y1="164" x2="462" y2="352" stroke="#2a8a2a" stroke-width="0.7"/>
  <line x1="492" y1="164" x2="492" y2="352" stroke="#2a8a2a" stroke-width="0.7"/>
  <line x1="522" y1="164" x2="522" y2="352" stroke="#2a8a2a" stroke-width="0.7"/>
  <line x1="552" y1="164" x2="552" y2="352" stroke="#2a8a2a" stroke-width="0.7"/>
  <text x="512" y="302" text-anchor="middle" font-size="11" fill="#1a5a1a" font-weight="bold">全熱交換</text>
  <text x="512" y="318" text-anchor="middle" font-size="10" fill="#1a5a1a">熱交換コア</text>
  <text x="512" y="335" text-anchor="middle" font-size="8" fill="#1a5a1a">Heat Exchanger</text>

  <!-- Condensate arrow -->
  <path d="M 512 352 L 512 380 L 480 380 L 480 414" fill="none" stroke="#4a90d9" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a2)"/>
  <text x="500" y="372" text-anchor="middle" font-size="8" fill="#1a4a80">結露水</text>

  <!-- MFC module (bottom center) -->
  <rect x="230" y="414" width="200" height="104" rx="6" fill="#2a5a2a" stroke="#1a3a1a" stroke-width="2"/>
  <text x="330" y="440" text-anchor="middle" font-size="13" fill="white" font-weight="bold">MFC モジュール</text>
  <text x="330" y="458" text-anchor="middle" font-size="9" fill="#90e890">Microbial Fuel Cell</text>
  <text x="330" y="476" text-anchor="middle" font-size="9" fill="#c0f0c0">入力: 有機物（HEPAより）</text>
  <text x="330" y="492" text-anchor="middle" font-size="9" fill="#c0f0c0">　　　結露水（熱交換より）</text>
  <text x="330" y="508" text-anchor="middle" font-size="9" fill="#80e080">出力: 1〜10 mW</text>

  <!-- Energy IC + Capacitor -->
  <rect x="450" y="414" width="140" height="104" rx="6" fill="#3a1a5a" stroke="#1a0a3a" stroke-width="2"/>
  <text x="520" y="440" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Energy IC</text>
  <rect x="460" y="448" width="48" height="28" rx="3" fill="#5a2a8a" stroke="#fff" stroke-width="0.8"/>
  <text x="484" y="462" text-anchor="middle" font-size="8" fill="white">BQ25504</text>
  <text x="484" y="472" text-anchor="middle" font-size="7" fill="#d0a0ff">50mV↑</text>
  <rect x="522" y="448" width="58" height="28" rx="3" fill="#5a2a8a" stroke="#fff" stroke-width="0.8"/>
  <text x="551" y="462" text-anchor="middle" font-size="8" fill="white">10F Cap</text>
  <text x="551" y="472" text-anchor="middle" font-size="7" fill="#d0a0ff">蓄電</text>
  <text x="520" y="495" text-anchor="middle" font-size="9" fill="#c090ff">nRF52840</text>
  <text x="520" y="510" text-anchor="middle" font-size="8" fill="#a070df">BLE + NFC + CO₂</text>

  <!-- MFC to Energy IC arrow -->
  <line x1="430" y1="466" x2="448" y2="466" stroke="#80e080" stroke-width="2" marker-end="url(#a3)"/>

  <!-- Fan (center) -->
  <circle cx="410" cy="248" r="42" fill="#f0f0f0" stroke="#888" stroke-width="2"/>
  <circle cx="410" cy="248" r="18" fill="#ccc" stroke="#888" stroke-width="1.5"/>
  <!-- fan blades -->
  <path d="M410,248 L405,215 Q410,205 418,210 L430,248 Z" fill="#aaa" stroke="#888" stroke-width="0.8"/>
  <path d="M410,248 L443,243 Q452,248 447,256 L410,268 Z" fill="#aaa" stroke="#888" stroke-width="0.8"/>
  <path d="M410,248 L415,281 Q410,291 402,286 L390,248 Z" fill="#aaa" stroke="#888" stroke-width="0.8"/>
  <path d="M410,248 L377,253 Q368,248 373,240 L410,228 Z" fill="#aaa" stroke="#888" stroke-width="0.8"/>
  <text x="410" y="252" text-anchor="middle" font-size="9" fill="#444">Fan</text>
  <text x="410" y="302" text-anchor="middle" font-size="9" fill="#555">排気ファン 30W</text>

  <!-- Exhaust -->
  <rect x="228" y="358" width="160" height="50" rx="4" fill="#ffe8e8" stroke="#d04040" stroke-width="1.5"/>
  <line x1="238" y1="370" x2="378" y2="370" stroke="#d04040" stroke-width="2"/>
  <line x1="238" y1="384" x2="378" y2="384" stroke="#d04040" stroke-width="2"/>
  <line x1="238" y1="398" x2="378" y2="398" stroke="#d04040" stroke-width="2"/>
  <text x="308" y="408" text-anchor="middle" font-size="9" fill="#a02020" font-weight="bold">排気口</text>

  <!-- Airflow arrows -->
  <text x="150" y="204" text-anchor="middle" font-size="10" fill="#4a90d9" font-weight="bold">外気</text>
  <text x="150" y="218" text-anchor="middle" font-size="9" fill="#4a90d9">（汚染空気）</text>
  <path d="M 175 208 L 222 208" fill="none" stroke="#4a90d9" stroke-width="2" marker-end="url(#a4)"/>

  <text x="150" y="395" text-anchor="middle" font-size="10" fill="#d04040" font-weight="bold">排気</text>
  <text x="150" y="409" text-anchor="middle" font-size="9" fill="#d04040">（清浄空気）</text>
  <path d="M 222 394 L 175 394" fill="none" stroke="#d04040" stroke-width="2" marker-end="url(#a5)"/>

  <text x="680" y="204" text-anchor="middle" font-size="10" fill="#2a8a2a" font-weight="bold">室内</text>
  <text x="680" y="218" text-anchor="middle" font-size="9" fill="#2a8a2a">（清浄空気）</text>
  <path d="M 600 208 L 660 208" fill="none" stroke="#2a8a2a" stroke-width="2" marker-end="url(#a6)"/>

  <!-- Solar to Fan wire -->
  <line x1="540" y1="156" x2="540" y2="175" stroke="#ffcc00" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="560" y="168" font-size="8" fill="#cc8800">24V DC</text>

  <!-- BLE signal -->
  <path d="M 540 460 Q 620 420 680 440" fill="none" stroke="#8040ff" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="690" y="438" font-size="9" fill="#8040ff">BLE</text>
  <text x="690" y="450" font-size="8" fill="#8040ff">データ送信</text>

  <!-- Legend -->
  <rect x="220" y="540" width="480" height="82" rx="6" fill="#f8f8f8" stroke="#ccc" stroke-width="1"/>
  <text x="460" y="558" text-anchor="middle" font-size="11" font-weight="bold">凡例 / Legend</text>
  <rect x="232" y="566" width="14" height="10" fill="#1a3a6b"/>
  <text x="252" y="576" font-size="9">太陽光パネル（換気ファン電源）</text>
  <rect x="232" y="582" width="14" height="10" fill="#2a5a2a"/>
  <text x="252" y="592" font-size="9">MFCモジュール（センサー電源 + 有機物分解）</text>
  <rect x="430" y="566" width="14" height="10" fill="#fff0e0" stroke="#e8a020" stroke-width="1"/>
  <text x="450" y="576" font-size="9">HEPAフィルター（捕集物 → MFC燃料）</text>
  <rect x="430" y="582" width="14" height="10" fill="#e8ffe8" stroke="#2a8a2a" stroke-width="1"/>
  <text x="450" y="592" font-size="9">熱交換コア（結露水 → MFC電解液）</text>

  <line x1="232" y1="603" x2="246" y2="603" stroke="#e8a020" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="252" y="607" font-size="9">有機物フロー</text>
  <line x1="360" y1="603" x2="374" y2="603" stroke="#4a90d9" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="380" y="607" font-size="9">結露水フロー</text>
  <line x1="470" y1="603" x2="484" y2="603" stroke="#ffcc00" stroke-width="2"/>
  <text x="490" y="607" font-size="9">電力ライン</text>
  <line x1="556" y1="603" x2="570" y2="603" stroke="#8040ff" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="576" y="607" font-size="9">無線通信</text>

  <defs>
    <marker id="a1" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#e8a020"/></marker>
    <marker id="a2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#4a90d9"/></marker>
    <marker id="a3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#80e080"/></marker>
    <marker id="a4" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#4a90d9"/></marker>
    <marker id="a5" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#d04040"/></marker>
    <marker id="a6" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#2a8a2a"/></marker>
  </defs>

  <text x="450" y="630" text-anchor="middle" font-size="10" fill="#888">Fig. 2 — 特許出願用図面　©2026 濱田優貴</text>
</svg>
