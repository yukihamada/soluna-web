  <text x="400" y="120" text-anchor="middle" font-size="12" font-weight="bold">竹合板カバー（防水加工）</text>
  <text x="400" y="138" text-anchor="middle" font-size="10" fill="#555">Bamboo plywood cover (waterproof)　5 mm</text>

  <!-- Layer 2: PCB -->
  <rect x="180" y="148" width="440" height="64" fill="#1a6b3a" stroke="#0d3d20" stroke-width="1.5"/>
  <!-- PCB components -->
  <rect x="210" y="160" width="50" height="28" rx="3" fill="#2d9e5a" stroke="#fff" stroke-width="0.8"/>
  <text x="235" y="174" text-anchor="middle" font-size="8" fill="white" font-weight="bold">BQ25504</text>
  <text x="235" y="184" text-anchor="middle" font-size="7" fill="#cff0da">Energy IC</text>

  <rect x="278" y="160" width="52" height="28" rx="3" fill="#2d9e5a" stroke="#fff" stroke-width="0.8"/>
  <text x="304" y="174" text-anchor="middle" font-size="8" fill="white" font-weight="bold">10F Cap</text>
  <text x="304" y="184" text-anchor="middle" font-size="7" fill="#cff0da">5.5V Super</text>

  <rect x="348" y="160" width="56" height="28" rx="3" fill="#2d9e5a" stroke="#fff" stroke-width="0.8"/>
  <text x="376" y="174" text-anchor="middle" font-size="8" fill="white" font-weight="bold">nRF52840</text>
  <text x="376" y="184" text-anchor="middle" font-size="7" fill="#cff0da">BLE + NFC</text>

  <!-- NFC antenna -->
  <ellipse cx="480" cy="174" rx="26" ry="14" fill="none" stroke="#7fdfaa" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="480" y="178" text-anchor="middle" font-size="7" fill="#7fdfaa">NFC</text>

  <text x="400" y="203" text-anchor="middle" font-size="9" fill="#cff0da">PCB 回路基板　6 mm</text>

