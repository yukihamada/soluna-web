  <line x1="280" y1="260" x2="280" y2="290" stroke="#555" stroke-width="0.5"/>
  <line x1="300" y1="260" x2="300" y2="290" stroke="#555" stroke-width="0.5"/>
  <line x1="320" y1="260" x2="320" y2="290" stroke="#555" stroke-width="0.5"/>
  <line x1="340" y1="260" x2="340" y2="290" stroke="#555" stroke-width="0.5"/>
  <line x1="360" y1="260" x2="360" y2="290" stroke="#555" stroke-width="0.5"/>
  <line x1="380" y1="260" x2="380" y2="290" stroke="#555" stroke-width="0.5"/>
  <line x1="400" y1="260" x2="400" y2="290" stroke="#555" stroke-width="0.5"/>
