  <line x1="480" y1="212" x2="480" y2="242" stroke="#555" stroke-width="0.5"/>
  <line x1="500" y1="212" x2="500" y2="242" stroke="#555" stroke-width="0.5"/>
  <line x1="520" y1="212" x2="520" y2="242" stroke="#555" stroke-width="0.5"/>
  <line x1="540" y1="212" x2="540" y2="242" stroke="#555" stroke-width="0.5"/>
  <line x1="560" y1="212" x2="560" y2="242" stroke="#555" stroke-width="0.5"/>
  <line x1="580" y1="212" x2="580" y2="242" stroke="#555" stroke-width="0.5"/>
  <line x1="600" y1="212" x2="600" y2="242" stroke="#555" stroke-width="0.5"/>
  <text x="400" y="231" text-anchor="middle" font-size="11" fill="white" font-weight="bold">炭素繊維フェルト電極（＋ アノード）　2 mm</text>

  <!-- Layer 4: PEM -->
  <rect x="180" y="242" width="440" height="18" fill="#c8e8ff" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="400" y="255" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a4a80">Nafion N117 プロトン交換膜（PEM）　0.5 mm</text>

  <!-- Layer 5: Cathode electrode -->
  <rect x="180" y="260" width="440" height="30" fill="#3a3a3a" stroke="#111" stroke-width="1.5"/>
  <line x1="200" y1="260" x2="200" y2="290" stroke="#555" stroke-width="0.5"/>
  <line x1="220" y1="260" x2="220" y2="290" stroke="#555" stroke-width="0.5"/>
  <line x1="240" y1="260" x2="240" y2="290" stroke="#555" stroke-width="0.5"/>
