  <line x1="520" y1="260" x2="520" y2="290" stroke="#555" stroke-width="0.5"/>
  <line x1="540" y1="260" x2="540" y2="290" stroke="#555" stroke-width="0.5"/>
  <line x1="560" y1="260" x2="560" y2="290" stroke="#555" stroke-width="0.5"/>
  <line x1="580" y1="260" x2="580" y2="290" stroke="#555" stroke-width="0.5"/>
  <line x1="600" y1="260" x2="600" y2="290" stroke="#555" stroke-width="0.5"/>
  <text x="400" y="279" text-anchor="middle" font-size="11" fill="white" font-weight="bold">炭素繊維フェルト電極（－ カソード）　2 mm</text>

  <!-- Layer 6: Microbial bed -->
  <rect x="180" y="290" width="440" height="130" fill="#8B6914" stroke="#5c4409" stroke-width="1.5"/>
  <!-- soil texture dots -->
  <circle cx="210" cy="315" r="3" fill="#6b4f10" opacity="0.7"/>
  <circle cx="240" cy="325" r="4" fill="#6b4f10" opacity="0.6"/>
  <circle cx="270" cy="310" r="3" fill="#6b4f10" opacity="0.8"/>
  <circle cx="300" cy="330" r="5" fill="#6b4f10" opacity="0.5"/>
  <circle cx="330" cy="318" r="3" fill="#6b4f10" opacity="0.7"/>
  <circle cx="360" cy="308" r="4" fill="#6b4f10" opacity="0.6"/>
  <circle cx="390" cy="325" r="3" fill="#6b4f10" opacity="0.8"/>
  <circle cx="420" cy="315" r="5" fill="#6b4f10" opacity="0.5"/>
  <circle cx="450" cy="330" r="3" fill="#6b4f10" opacity="0.7"/>
  <circle cx="480" cy="310" r="4" fill="#6b4f10" opacity="0.6"/>
  <circle cx="510" cy="320" r="3" fill="#6b4f10" opacity="0.8"/>
  <circle cx="540" cy="328" r="5" fill="#6b4f10" opacity="0.5"/>
  <circle cx="570" cy="312" r="3" fill="#6b4f10" opacity="0.7"/>
  <circle cx="600" cy="322" r="4" fill="#6b4f10" opacity="0.6"/>
  <!-- bacteria indicators -->
  <ellipse cx="225" cy="350" rx="6" ry="3" fill="#c8f080" opacity="0.8"/>
  <ellipse cx="310" cy="355" rx="7" ry="3" fill="#c8f080" opacity="0.8"/>
  <ellipse cx="400" cy="345" rx="6" ry="3" fill="#c8f080" opacity="0.8"/>
  <ellipse cx="490" cy="358" rx="7" ry="3" fill="#c8f080" opacity="0.8"/>
  <ellipse cx="575" cy="348" rx="6" ry="3" fill="#c8f080" opacity="0.8"/>
  <text x="400" y="375" text-anchor="middle" font-size="12" fill="white" font-weight="bold">菌 床</text>
  <text x="400" y="393" text-anchor="middle" font-size="10" fill="#f0d88a">ライスストロー（炭素源） + Geobacter 系混合菌叢</text>
  <text x="400" y="410" text-anchor="middle" font-size="10" fill="#f0d88a">設置地点の表土 100g を混合（初期接種）</text>
  <text x="400" y="427" text-anchor="middle" font-size="9" fill="#d4b87a">Microbial bed — Rice straw substrate + electroactive bacteria</text>

  <!-- Bottom border -->
  <rect x="180" y="420" width="440" height="8" fill="#5c4409" stroke="#3d2d05" stroke-width="1"/>

  <!-- Electrochemical reactions -->
  <rect x="52" y="212" width="120" height="36" rx="4" fill="#fff8e8" stroke="#e8a020" stroke-width="1"/>
  <text x="112" y="228" text-anchor="middle" font-size="9" fill="#8b5a00">アノード（酸化）</text>
  <text x="112" y="242" text-anchor="middle" font-size="9" fill="#8b5a00">有機物 → CO₂ + H⁺ + e⁻</text>
  <line x1="172" y1="227" x2="182" y2="227" stroke="#e8a020" stroke-width="1.2" marker-end="url(#arr)"/>

  <rect x="52" y="260" width="120" height="36" rx="4" fill="#e8f4ff" stroke="#4a90d9" stroke-width="1"/>
  <text x="112" y="276" text-anchor="middle" font-size="9" fill="#1a4a80">カソード（還元）</text>
  <text x="112" y="290" text-anchor="middle" font-size="9" fill="#1a4a80">O₂ + 4H⁺ + 4e⁻ → 2H₂O</text>
  <line x1="172" y1="275" x2="182" y2="275" stroke="#4a90d9" stroke-width="1.2" marker-end="url(#arr2)"/>

  <!-- electron flow arrow -->
  <path d="M 620 227 Q 650 227 650 275 Q 650 310 620 310" fill="none" stroke="#f0a000" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="660" y="270" font-size="9" fill="#c07800" transform="rotate(90,660,270)">電子（e⁻）→ 電力</text>

  <!-- Output annotation -->
  <rect x="190" y="465" width="420" height="52" rx="6" fill="#f0f8f0" stroke="#2a7a2a" stroke-width="1.2"/>
  <text x="400" y="483" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5a1a">出力仕様</text>
  <text x="400" y="500" text-anchor="middle" font-size="10" fill="#2a6a2a">開回路電圧: 0.3〜0.8 V　｜　出力電力: 1〜40 mW（季節・土壌依存）</text>
  <text x="400" y="516" text-anchor="middle" font-size="10" fill="#2a6a2a">BEF フィンガープリント周期: 24h ｜ 耐用年数: 10 年以上</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e8a020"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4a90d9"/>
    </marker>
  </defs>

  <!-- Figure number -->
  <text x="400" y="578" text-anchor="middle" font-size="10" fill="#888">Fig. 1 — 特許出願用図面　©2026 濱田優貴</text>
</svg>
