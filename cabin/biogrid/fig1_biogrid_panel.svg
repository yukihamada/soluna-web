<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" font-family="'Helvetica Neue',Arial,sans-serif">
  <rect width="800" height="600" fill="white"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="16" font-weight="bold">【図1】バイオグリッドパネル 断面構造図</text>
  <text x="400" y="56" text-anchor="middle" font-size="11" fill="#555">Fig.1  BioGrid Panel — Cross-Section</text>

  <!-- Overall dimension lines -->
  <line x1="180" y1="88" x2="620" y2="88" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="180" y1="88" x2="180" y2="82" stroke="#999" stroke-width="1"/>
  <line x1="620" y1="88" x2="620" y2="82" stroke="#999" stroke-width="1"/>
  <text x="400" y="80" text-anchor="middle" font-size="10" fill="#555">300 mm</text>

  <line x1="628" y1="100" x2="628" y2="510" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="628" y1="100" x2="634" y2="100" stroke="#999" stroke-width="1"/>
  <line x1="628" y1="510" x2="634" y2="510" stroke="#999" stroke-width="1"/>
