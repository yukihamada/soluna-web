<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SOLUNA · 変更履歴 — Admin Audit</title>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#040404">
<meta name="robots" content="noindex,nofollow">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#c8a455; --gold-dim:rgba(200,164,85,.4); --gold-soft:rgba(200,164,85,.08);
  --accent:#66aabb; --accent-soft:rgba(102,170,187,.08);
  --bg:#040404; --panel:#0a0a0a; --panel2:#0d0d0d;
  --line:#1a1a1a; --text:#f0ece4; --text-dim:#b4b4b4; --text-soft:#666;
  --ok:#4a9a5a; --warn:#d49b4a; --danger:#c0392b;
}
body{background:var(--bg);color:var(--text);min-height:100vh;
     font-family:'Helvetica Neue',-apple-system,'Noto Sans JP',sans-serif;
     font-size:14.5px;line-height:1.6;
     padding:max(20px,env(safe-area-inset-top)) 20px calc(40px + env(safe-area-inset-bottom));}
.wrap{max-width:1100px;margin:0 auto}
nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:10px}
nav .logo{font-size:11px;font-weight:800;letter-spacing:.25em;color:var(--gold)}
nav .links a{color:var(--text-dim);font-size:11.5px;border:1px solid #222;padding:8px 14px;border-radius:100px;margin-left:6px;text-decoration:none;display:inline-block;min-height:34px;line-height:1}
nav .links a:hover{color:var(--gold);border-color:var(--gold-dim)}
header.head{padding:8px 0 18px;border-bottom:1px solid var(--line);margin-bottom:18px}
header h1{font-size:clamp(1.5rem,4.5vw,1.9rem);font-weight:800;letter-spacing:-.02em}
header .sub{font-size:13px;color:var(--text-dim);margin-top:6px}

.tabs{display:flex;gap:8px;margin-bottom:18px;border-bottom:1px solid var(--line)}
.tabs button{
  background:transparent;border:none;color:var(--text-dim);
  font-size:13px;letter-spacing:.04em;padding:11px 16px;cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;font-family:inherit;font-weight:600;
}
.tabs button:hover{color:var(--text)}
.tabs button.on{color:var(--gold);border-bottom-color:var(--gold)}
.tab-panel{display:none}
.tab-panel.on{display:block}

.log .row.signin{grid-template-columns:120px 78px 70px 1fr 1fr 1fr;}
.log .row.signin.head{display:grid}
.log .result{display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.04em;padding:3px 8px;border-radius:100px;line-height:1}
.log .result.ok{background:rgba(74,154,90,.13);color:#6cc26b}
.log .result.wrong_code{background:rgba(192,57,43,.13);color:#d65a4d}
.log .result.rate_limit{background:rgba(212,155,74,.13);color:#d49b4a}
.log .method{display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.04em;padding:3px 8px;border-radius:100px;line-height:1;background:var(--accent-soft);color:var(--accent)}
.log .ua{font-size:11px;color:var(--text-soft);word-break:break-all;line-height:1.5;font-family:inherit}
@media(max-width:760px){
  .log .row.signin{grid-template-columns:1fr;gap:4px;font-size:12.5px}
}

.filters{display:flex;flex-wrap:wrap;gap:10px;margin:16px 0 22px;padding:14px;background:var(--panel);border:1px solid var(--line);border-radius:10px}
.filters select,.filters input{
  background:var(--bg);border:1px solid var(--line);color:var(--text);
  padding:9px 12px;border-radius:8px;font-size:13px;font-family:inherit;
  min-height:38px;outline:none;-webkit-appearance:none;
}
.filters select:focus,.filters input:focus{border-color:var(--gold)}
.filters label{font-size:10.5px;letter-spacing:.16em;color:var(--text-soft);text-transform:uppercase;font-weight:700;margin-bottom:4px;display:block}
.filters .field{display:flex;flex-direction:column;min-width:130px;flex:1}
.filters .btn{
  align-self:flex-end;background:var(--gold);color:#040404;border:none;
  font-weight:800;font-size:12px;letter-spacing:.06em;padding:10px 18px;border-radius:100px;
  cursor:pointer;min-height:38px;font-family:inherit;line-height:1;
}

.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:24px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px}
.stat .k{font-size:9.5px;letter-spacing:.2em;color:var(--text-soft);text-transform:uppercase;font-weight:700}
.stat .v{font-size:22px;font-weight:800;color:var(--text);margin-top:5px;font-variant-numeric:tabular-nums}
.stat .delta{font-size:11px;color:var(--text-dim);margin-top:2px}

.log{background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.log .row{
  display:grid;grid-template-columns:120px 78px 90px 1fr 1fr 1fr;
  gap:14px;padding:11px 16px;border-bottom:1px solid var(--line);
  font-size:13px;align-items:baseline;
}
.log .row:last-child{border-bottom:0}
.log .row:hover{background:var(--panel2)}
.log .row.head{
  background:#070707;font-size:10.5px;letter-spacing:.14em;color:var(--text-soft);
  text-transform:uppercase;font-weight:700;
}
.log .ts{color:var(--text-soft);font-variant-numeric:tabular-nums;font-size:11.5px;font-family:'SF Mono',monospace}
.log .slug{font-family:'SF Mono',monospace;font-size:11.5px;color:var(--accent)}
.log .action{
  display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.04em;
  padding:3px 8px;border-radius:100px;line-height:1;
}
.log .action.rotate{background:rgba(212,155,74,.13);color:#e0ab5d}
.log .action.edit{background:var(--gold-soft);color:var(--gold)}
.log .action.manual_set{background:rgba(102,170,187,.13);color:var(--accent)}
.log .field{font-family:'SF Mono',monospace;font-size:12px;color:var(--text-dim);word-break:break-all}
.log .val{font-family:'SF Mono',monospace;font-size:12px;word-break:break-all;line-height:1.5}
.log .val.old{color:var(--text-soft);text-decoration:line-through}
.log .val.new{color:var(--text);font-weight:600}
.log .by{font-size:11px;color:var(--text-soft);word-break:break-all;line-height:1.5}
.log .empty{padding:32px;text-align:center;color:var(--text-soft);font-size:13px}

@media(max-width:760px){
  .log .row{grid-template-columns:1fr;gap:4px;padding:14px 16px;font-size:12.5px}
  .log .row.head{display:none}
  .log .ts::before{content:'time '; color:#3a3a3a; font-size:9px; letter-spacing:.18em}
  .log .slug::before{content:'slug '; color:#3a3a3a; font-size:9px; letter-spacing:.18em}
  .log .field::before{content:'field '; color:#3a3a3a; font-size:9px; letter-spacing:.18em}
  .log .val.old::before{content:'old '; color:#3a3a3a; font-size:9px; letter-spacing:.18em; text-decoration:none; display:inline-block}
  .log .val.new::before{content:'new '; color:#3a3a3a; font-size:9px; letter-spacing:.18em; display:inline-block}
  .log .by::before{content:'by '; color:#3a3a3a; font-size:9px; letter-spacing:.18em}
}

.toast{position:fixed;left:50%;bottom:calc(24px + env(safe-area-inset-bottom));
  transform:translateX(-50%) translateY(20px);
  background:#0e0e0e;border:1px solid var(--gold-dim);color:var(--gold);
  font-size:12.5px;padding:11px 18px;border-radius:100px;z-index:300;opacity:0;transition:all .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

footer{margin-top:36px;padding-top:24px;border-top:1px solid var(--line);text-align:center;font-size:11.5px;color:var(--text-soft)}
footer a{color:var(--gold);text-decoration:none}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:6px}
</style>
</head>
<body>
<div class="wrap">
  <nav>
    <span class="logo">SOLUNA · ADMIN</span>
    <span class="links">
      <a href="/admin/secrets">🔑 シークレット</a>
      <a href="/admin/team">👥 メンバー</a>
      <a href="/docs/runbook.pdf" target="_blank">📖 マニュアル</a>
    </span>
  </nav>

  <header class="head">
    <h1>変更履歴 / サインイン</h1>
    <div class="sub">物件シークレットの変更とログイン履歴を時系列で確認。最大 90 日保持。</div>
  </header>

  <div class="tabs" role="tablist">
    <button id="tab-secrets" class="on" type="button">🔑 シークレット変更</button>
    <button id="tab-signin" type="button">🔐 サインイン</button>
  </div>

  <div id="panel-secrets" class="tab-panel on">

  <div class="stats" id="stats">
    <div class="stat"><div class="k">期間</div><div class="v" id="s-days">…</div><div class="delta">日</div></div>
    <div class="stat"><div class="k">変更件数</div><div class="v" id="s-total">…</div><div class="delta" id="s-total-d">events</div></div>
    <div class="stat"><div class="k">rotate</div><div class="v" id="s-rotate">…</div><div class="delta">回</div></div>
    <div class="stat"><div class="k">edit</div><div class="v" id="s-edit">…</div><div class="delta">回</div></div>
    <div class="stat"><div class="k">直近</div><div class="v" id="s-recent" style="font-size:13px;font-weight:600">…</div><div class="delta" id="s-recent-by">by …</div></div>
  </div>

  <div class="filters">
    <div class="field">
      <label>物件</label>
      <select id="fSlug">
        <option value="">すべて</option>
        <option value="atami">atami</option>
        <option value="lodge">lodge</option>
        <option value="nesting">nesting</option>
        <option value="instant">instant</option>
      </select>
    </div>
    <div class="field">
      <label>action</label>
      <select id="fAction">
        <option value="">すべて</option>
        <option value="rotate">rotate</option>
        <option value="edit">edit</option>
        <option value="manual_set">manual_set</option>
      </select>
    </div>
    <div class="field">
      <label>期間 (時間)</label>
      <input id="fHours" type="number" min="1" max="2160" value="168">
    </div>
    <div class="field" style="min-width:90px;max-width:130px;flex:0">
      <label>件数</label>
      <input id="fLimit" type="number" min="10" max="500" value="100">
    </div>
    <button class="btn" id="reload">再読込</button>
  </div>

  <div class="log" id="log"><div class="empty">読み込み中…</div></div>
  </div><!-- panel-secrets -->

  <div id="panel-signin" class="tab-panel">
    <div class="filters">
      <div class="field">
        <label>email</label>
        <input id="sEmail" type="email" placeholder="(全員)" autocomplete="off">
      </div>
      <div class="field">
        <label>結果</label>
        <select id="sResult">
          <option value="">すべて</option>
          <option value="ok">ok</option>
          <option value="wrong_code">wrong_code</option>
        </select>
      </div>
      <div class="field">
        <label>期間 (時間)</label>
        <input id="sHours" type="number" min="1" max="2160" value="168">
      </div>
      <div class="field" style="min-width:90px;max-width:130px;flex:0">
        <label>件数</label>
        <input id="sLimit" type="number" min="10" max="500" value="100">
      </div>
      <button class="btn" id="sReload">再読込</button>
    </div>
    <div class="stats">
      <div class="stat"><div class="k">期間</div><div class="v" id="ss-days">…</div><div class="delta">日</div></div>
      <div class="stat"><div class="k">サインイン</div><div class="v" id="ss-total">…</div><div class="delta">件</div></div>
      <div class="stat"><div class="k">成功</div><div class="v" id="ss-ok">…</div></div>
      <div class="stat"><div class="k">失敗</div><div class="v" id="ss-fail" style="color:#d65a4d">…</div></div>
      <div class="stat"><div class="k">ユニーク IP</div><div class="v" id="ss-ip">…</div></div>
    </div>
    <div class="log" id="signinLog"><div class="empty">クリックで読み込み</div></div>
  </div><!-- panel-signin -->

  <footer>
    監査ログは 90 日保持。Need help? <a href="mailto:info@solun.art">info@solun.art</a>
  </footer>
</div>
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
(function(){
  const $ = (id) => document.getElementById(id);
  function getToken(){ try { return localStorage.getItem('sln_token') || ''; } catch(e){ return ''; } }
  function authH(){ return { 'Authorization':'Bearer '+getToken(), 'X-Requested-With':'XMLHttpRequest' }; }
  function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
  function showToast(t){ const el=$('toast'); el.textContent=t; el.classList.add('show'); clearTimeout(showToast._t); showToast._t=setTimeout(()=>el.classList.remove('show'), 2000); }
  function fmtTs(s){ if(!s) return ''; return s.replace('T',' ').slice(0,16); }

  async function load(){
    const params = new URLSearchParams();
    if ($('fSlug').value)   params.set('slug',   $('fSlug').value);
    if ($('fAction').value) params.set('action', $('fAction').value);
    params.set('since_hours', $('fHours').value || '168');
    params.set('limit', $('fLimit').value || '100');
    $('log').innerHTML = '<div class="empty">読み込み中…</div>';
    try {
      const r = await fetch('/api/soluna/admin/audit?' + params.toString(), { headers: authH() });
      const j = await r.json();
      if (!r.ok || j.ok === false) throw new Error(j.error || 'HTTP '+r.status);
      renderStats(j);
      renderLog(j.audit || []);
    } catch(e){
      $('log').innerHTML = '<div class="empty">読み込み失敗: '+esc(e.message)+'</div>';
    }
  }

  function renderStats(j){
    const rows = j.audit || [];
    $('s-days').textContent  = Math.round((j.filters.sinceHours || 168) / 24);
    $('s-total').textContent = rows.length;
    $('s-rotate').textContent = rows.filter(r=>r.action==='rotate').length;
    $('s-edit').textContent   = rows.filter(r=>r.action==='edit').length;
    const latest = rows[0];
    if (latest){
      $('s-recent').textContent = fmtTs(latest.created_at) + ' UTC';
      $('s-recent-by').textContent = 'by ' + (latest.by_email || '—') + ' · ' + latest.action + ' on ' + latest.slug;
    } else {
      $('s-recent').textContent = '—'; $('s-recent-by').textContent = 'なし';
    }
  }

  function renderLog(rows){
    if (!rows.length){ $('log').innerHTML = '<div class="empty">該当する変更履歴はありません</div>'; return; }
    const head = ''
      + '<div class="row head">'
      +   '<div>日時 (UTC)</div><div>物件</div><div>action</div><div>field</div><div>old → new</div><div>by</div>'
      + '</div>';
    const body = rows.map(r => {
      const oldV = r.old_value === null ? '∅' : r.old_value;
      const newV = r.new_value === null ? '∅' : r.new_value;
      return ''
        + '<div class="row">'
        +   '<div class="ts">'+esc(fmtTs(r.created_at))+'</div>'
        +   '<div class="slug">/'+esc(r.slug)+'</div>'
        +   '<div><span class="action '+esc(r.action)+'">'+esc(r.action)+'</span></div>'
        +   '<div class="field">'+esc(r.field)+'</div>'
        +   '<div class="val"><span class="old">'+esc(oldV)+'</span> <span style="color:#444">→</span> <span class="new">'+esc(newV)+'</span></div>'
        +   '<div class="by">'+esc(r.by_email || '—')+(r.client_ip ? '<br><span style="color:#3a3a3a">'+esc(r.client_ip)+'</span>' : '')+'</div>'
        + '</div>';
    }).join('');
    $('log').innerHTML = head + body;
  }

  $('reload').addEventListener('click', load);
  ['fSlug','fAction'].forEach(id => $(id).addEventListener('change', load));
  ['fHours','fLimit'].forEach(id => $(id).addEventListener('change', load));
  load();

  // ── Sign-in tab ─────────────────────────────────────────────
  let signinLoaded = false;
  async function loadSignin(){
    const params = new URLSearchParams();
    if ($('sEmail').value)  params.set('email',  $('sEmail').value.trim().toLowerCase());
    if ($('sResult').value) params.set('result', $('sResult').value);
    params.set('since_hours', $('sHours').value || '168');
    params.set('limit',       $('sLimit').value || '100');
    $('signinLog').innerHTML = '<div class="empty">読み込み中…</div>';
    try {
      const r = await fetch('/api/soluna/admin/signin-log?' + params.toString(), { headers: authH() });
      const j = await r.json();
      if (!r.ok || j.ok === false) throw new Error(j.error || 'HTTP '+r.status);
      renderSigninStats(j);
      renderSigninLog(j.signins || []);
      signinLoaded = true;
    } catch(e){
      $('signinLog').innerHTML = '<div class="empty">読み込み失敗: '+esc(e.message)+'</div>';
    }
  }

  function renderSigninStats(j){
    const rows = j.signins || [];
    $('ss-days').textContent  = Math.round((j.filters.sinceHours || 168) / 24);
    $('ss-total').textContent = rows.length;
    $('ss-ok').textContent    = rows.filter(r=>r.result==='ok').length;
    $('ss-fail').textContent  = rows.filter(r=>r.result!=='ok').length;
    $('ss-ip').textContent    = new Set(rows.map(r=>r.ip).filter(Boolean)).size;
  }

  function renderSigninLog(rows){
    if (!rows.length){ $('signinLog').innerHTML = '<div class="empty">該当するサインイン履歴はありません</div>'; return; }
    const head = '<div class="row signin head"><div>日時 (UTC)</div><div>方法</div><div>結果</div><div>email</div><div>IP</div><div>UA</div></div>';
    const body = rows.map(r => ''
      + '<div class="row signin">'
      +   '<div class="ts">'+esc(fmtTs(r.created_at))+'</div>'
      +   '<div><span class="method">'+esc(r.method)+'</span></div>'
      +   '<div><span class="result '+esc(r.result)+'">'+esc(r.result)+'</span></div>'
      +   '<div class="by">'+esc(r.email || '—')+'</div>'
      +   '<div class="by">'+esc(r.ip || '—')+'</div>'
      +   '<div class="ua">'+esc((r.ua||'').slice(0,80))+'</div>'
      + '</div>').join('');
    $('signinLog').innerHTML = head + body;
  }

  $('sReload').addEventListener('click', loadSignin);
  ['sEmail','sResult','sHours','sLimit'].forEach(id => $(id).addEventListener('change', loadSignin));

  $('tab-secrets').addEventListener('click', () => {
    $('tab-secrets').classList.add('on'); $('tab-signin').classList.remove('on');
    $('panel-secrets').classList.add('on'); $('panel-signin').classList.remove('on');
  });
  $('tab-signin').addEventListener('click', () => {
    $('tab-signin').classList.add('on'); $('tab-secrets').classList.remove('on');
    $('panel-signin').classList.add('on'); $('panel-secrets').classList.remove('on');
    if (!signinLoaded) loadSignin();
  });
})();
</script>
<script defer src="https://enabler-analytics.fly.dev/t.js"></script>
</body>
</html>
