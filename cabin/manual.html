<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SOLUNA BUILD MANUAL</title>
  <style>
    /* ── CSS Variables ──────────────────────────────────── */
    :root {
      --bg: #030f0a;
      --card: rgba(255,255,255,.04);
      --line: rgba(255,255,255,.07);
      --gold: #c8a455;
      --gold-dim: rgba(200,164,85,.25);
      --text: rgba(237,233,225,.9);
      --text-dim: rgba(237,233,225,.4);
      --text-muted: rgba(237,233,225,.2);
      --plan-color: var(--gold);
    }

    /* ── Reset & Base ───────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Helvetica Neue', -apple-system, 'Noto Sans JP', sans-serif;
      -webkit-font-smoothing: antialiased;
      font-size: 14px;
      line-height: 1.65;
      overflow-x: hidden;
    }
    a { color: var(--plan-color); text-decoration: none; }
    a:hover { text-decoration: underline; }
    ::selection { background: var(--gold); color: #000; }

    /* ── Top Nav ────────────────────────────────────────── */
    #top-nav {
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgba(3,15,10,.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 20px;
      height: 52px;
    }
    .nav-logo {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .22em;
      color: var(--plan-color);
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .nav-back {
      font-size: 11px;
      color: var(--text-dim);
      border: 1px solid var(--line);
      padding: 4px 10px;
      border-radius: 100px;
      flex-shrink: 0;
      transition: border-color .2s, color .2s;
    }
    .nav-back:hover { color: var(--plan-color); border-color: var(--gold-dim); text-decoration: none; }
    .nav-spacer { flex: 1; }
    #btn-print {
      font-size: 11px;
      font-weight: 700;
      color: #000;
      background: var(--plan-color);
      border: none;
      padding: 6px 14px;
      border-radius: 100px;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity .2s;
    }
    #btn-print:hover { opacity: .85; }

    /* ── Plan Tabs ──────────────────────────────────────── */
    #plan-tabs {
      position: sticky;
      top: 52px;
      z-index: 190;
      background: rgba(3,15,10,.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
      display: flex;
      gap: 0;
      overflow-x: auto;
      scrollbar-width: none;
      padding: 0 20px;
    }
    #plan-tabs::-webkit-scrollbar { display: none; }
    .plan-tab {
      flex-shrink: 0;
      padding: 12px 16px 10px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: border-color .2s;
      user-select: none;
    }
    .plan-tab:hover .tab-name { opacity: 1; }
    .plan-tab.active { border-bottom-color: var(--plan-color); }
    .tab-name {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .12em;
      opacity: .45;
      transition: opacity .2s;
    }
    .plan-tab.active .tab-name { opacity: 1; color: var(--plan-color); }
    .tab-area { font-size: 9px; color: var(--text-muted); margin-top: 1px; letter-spacing: .06em; }

    /* ── Main Layout ────────────────────────────────────── */
    #main {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    /* ── Section ────────────────────────────────────────── */
    .section {
      margin-bottom: 64px;
    }
    .section-head {
      display: flex;
      align-items: baseline;
      gap: 14px;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }
    .section-num {
      font-size: 40px;
      font-weight: 900;
      color: var(--plan-color);
      opacity: .18;
      letter-spacing: -.02em;
      line-height: 1;
      flex-shrink: 0;
    }
    .section-title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: .06em;
    }
    .section-subtitle {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* ── Spec Table ─────────────────────────────────────── */
    .spec-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
    }
    @media (max-width: 480px) { .spec-grid { grid-template-columns: 1fr; } }
    .spec-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 6px;
    }
    .spec-k { font-size: 11px; color: var(--text-dim); flex-shrink: 0; }
    .spec-v { font-size: 12px; font-weight: 600; text-align: right; }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 16px;
    }
    @media (max-width: 600px) { .info-grid { grid-template-columns: 1fr 1fr; } }
    .info-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px 12px;
      text-align: center;
    }
    .info-card .ic-label { font-size: 9px; color: var(--text-muted); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 6px; }
    .info-card .ic-val { font-size: 16px; font-weight: 800; color: var(--plan-color); }
    .info-card .ic-unit { font-size: 9px; color: var(--text-dim); margin-top: 2px; }

    /* ── Lumber Table ───────────────────────────────────── */
    .lumber-wrap {
      overflow-x: auto;
      border-radius: 10px;
      border: 1px solid var(--line);
    }
    .lumber-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .lumber-table thead th {
      background: rgba(255,255,255,.06);
      padding: 10px 12px;
      text-align: left;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .1em;
      color: var(--text-dim);
      border-bottom: 1px solid var(--line);
      white-space: nowrap;
      position: sticky;
      top: 0;
    }
    .lumber-table tbody tr { border-bottom: 1px solid var(--line); }
    .lumber-table tbody tr:nth-child(odd) { background: rgba(255,255,255,.02); }
    .lumber-table tbody tr:hover { background: rgba(255,255,255,.05); }
    .lumber-table td { padding: 9px 12px; vertical-align: middle; }
    .lumber-table td:last-child { color: var(--text-dim); font-size: 11px; }
    .lumber-table tfoot td {
      padding: 10px 12px;
      border-top: 1px solid rgba(255,255,255,.15);
      font-weight: 700;
      background: rgba(255,255,255,.04);
      font-size: 11px;
    }
    .code-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 800;
      color: var(--plan-color);
      background: rgba(200,164,85,.1);
      border: 1px solid var(--gold-dim);
      border-radius: 4px;
      padding: 2px 6px;
      letter-spacing: .04em;
    }
    .length-cell { font-variant-numeric: tabular-nums; }
    .qty-cell { font-weight: 700; text-align: right; }

    /* ── Hardware Table ─────────────────────────────────── */
    .hw-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    @media (max-width: 500px) { .hw-grid { grid-template-columns: 1fr; } }
    .hw-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 14px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 7px;
    }
    .hw-name { font-size: 12px; font-weight: 600; flex: 1; }
    .hw-right { text-align: right; flex-shrink: 0; }
    .hw-qty { font-size: 12px; font-weight: 700; color: var(--plan-color); }
    .hw-note { font-size: 10px; color: var(--text-dim); margin-top: 2px; }

    /* ── SVG Foundation Diagram ─────────────────────────── */
    #svg-wrap {
      background: rgba(0,0,0,.5);
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      padding: 24px;
    }
    #foundation-svg {
      display: block;
      width: 100%;
      max-width: 680px;
      margin: 0 auto;
    }

    /* ── Steps ──────────────────────────────────────────── */
    .steps-list { display: flex; flex-direction: column; gap: 16px; }
    .step-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
    }
    .step-header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      cursor: pointer;
    }
    .step-num {
      font-size: 28px;
      font-weight: 900;
      color: var(--plan-color);
      opacity: .35;
      line-height: 1;
      flex-shrink: 0;
      width: 36px;
      text-align: right;
    }
    .step-icon { font-size: 24px; flex-shrink: 0; }
    .step-meta { flex: 1; }
    .step-week { font-size: 10px; color: var(--plan-color); font-weight: 700; letter-spacing: .1em; margin-bottom: 2px; }
    .step-phase { font-size: 15px; font-weight: 700; }
    .step-desc { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
    .step-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .badge {
      font-size: 10px;
      padding: 3px 9px;
      border-radius: 100px;
      border: 1px solid var(--line);
      color: var(--text-dim);
      white-space: nowrap;
    }
    .badge-phase { background: rgba(200,164,85,.1); border-color: var(--gold-dim); color: var(--plan-color); }
    .step-body {
      padding: 0 20px 18px 20px;
      border-top: 1px solid var(--line);
      display: none;
    }
    .step-card.open .step-body { display: block; }
    .step-card.open { border-color: var(--plan-color); }
    .step-body-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
    @media (max-width: 560px) { .step-body-inner { grid-template-columns: 1fr; } }
    .step-block-label { font-size: 9px; color: var(--text-muted); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 8px; font-weight: 700; }
    .tools-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .tool-chip {
      font-size: 10.5px;
      padding: 4px 9px;
      background: rgba(255,255,255,.05);
      border: 1px solid var(--line);
      border-radius: 6px;
    }
    .tips-box {
      background: rgba(200,164,85,.06);
      border: 1px solid var(--gold-dim);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 12px;
      color: rgba(237,233,225,.75);
      line-height: 1.75;
      grid-column: 1 / -1;
      margin-top: 4px;
    }
    .tips-box strong { color: var(--plan-color); }

    /* ── Tools Checklist ────────────────────────────────── */
    .tool-check-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    @media (max-width: 500px) { .tool-check-grid { grid-template-columns: 1fr; } }
    .tool-check-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 14px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 7px;
    }
    .tool-check-item input[type="checkbox"] {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      accent-color: var(--plan-color);
      margin-top: 1px;
    }
    .tool-check-item .tc-name { font-size: 12px; font-weight: 600; }
    .tool-check-item .tc-note { font-size: 10px; color: var(--text-dim); margin-top: 2px; }

    /* ── Stars ──────────────────────────────────────────── */
    .stars { color: var(--plan-color); font-size: 12px; }
    .stars-off { color: var(--line); }

    /* ── Print Styles ───────────────────────────────────── */
    @media print {
      @page { size: A4; margin: 15mm; }

      :root {
        --bg: #fff;
        --card: #f7f7f5;
        --line: #ddd;
        --gold: #8a6c28;
        --gold-dim: rgba(138,108,40,.3);
        --text: #111;
        --text-dim: #555;
        --text-muted: #888;
        --plan-color: #8a6c28;
      }

      body { background: #fff; color: #111; font-size: 11pt; }

      #top-nav, #plan-tabs, #btn-print, .no-print { display: none !important; }

      .print-plan-name {
        display: block !important;
        font-size: 10pt;
        font-weight: 700;
        letter-spacing: .15em;
        color: var(--plan-color);
        margin-bottom: 4px;
        text-transform: uppercase;
      }

      #main { max-width: 100%; padding: 0; }

      .section { margin-bottom: 40pt; }

      .section:not(:first-child) { page-break-before: always; }

      .section-num { opacity: .12; }

      .lumber-wrap { overflow: visible; }
      .lumber-table { font-size: 8.5pt; }
      .lumber-table thead th { background: #eee; color: #555; }
      .lumber-table tbody tr:nth-child(odd) { background: #f9f9f7; }

      .hw-grid { grid-template-columns: 1fr 1fr; }
      .hw-row { background: #f9f9f7; }

      .tool-check-grid { grid-template-columns: 1fr 1fr; }
      .tool-check-item { background: #f9f9f7; border-color: #ddd; }
      .tool-check-item input[type="checkbox"] { -webkit-print-color-adjust: exact; }

      .step-card { border: 1px solid #ddd !important; page-break-inside: avoid; }
      .step-body { display: block !important; }

      #svg-wrap { background: #fff; border: 1px solid #ccc; }
      #foundation-svg text { fill: #222 !important; }
    }

    /* hidden print element, shown only during print */
    .print-plan-name { display: none; }
  </style>
</head>
<body>

<!-- Top Nav -->
<nav id="top-nav">
  <a href="/build" class="nav-back no-print">← BUILD</a>
  <span class="nav-logo">SOLUNA BUILD MANUAL</span>
  <div class="nav-spacer"></div>
  <button id="btn-print" onclick="window.print()">印刷 / PDF保存</button>
</nav>

<!-- Plan Tabs -->
<div id="plan-tabs" class="no-print"></div>

<!-- Main Content -->
<div id="main">
  <!-- Print-only plan name -->
  <div class="print-plan-name" id="print-plan-name"></div>

  <!-- S1: 仕様書 -->
  <section class="section" id="s-specs">
    <div class="section-head">
      <span class="section-num">01</span>
      <div>
        <div class="section-title">仕様書</div>
        <div class="section-subtitle">Specifications</div>
      </div>
    </div>
    <div id="specs-content"></div>
  </section>

  <!-- S2: 木材カット表 -->
  <section class="section" id="s-lumber">
    <div class="section-head">
      <span class="section-num">02</span>
      <div>
        <div class="section-title">木材カット表</div>
        <div class="section-subtitle">Lumber Cut List</div>
      </div>
    </div>
    <div id="lumber-content"></div>
  </section>

  <!-- S3: 金物・副資材リスト -->
  <section class="section" id="s-hardware">
    <div class="section-head">
      <span class="section-num">03</span>
      <div>
        <div class="section-title">金物・副資材リスト</div>
        <div class="section-subtitle">Hardware &amp; Materials</div>
      </div>
    </div>
    <div id="hardware-content"></div>
  </section>

  <!-- S4: 基礎配置図 -->
  <section class="section" id="s-foundation">
    <div class="section-head">
      <span class="section-num">04</span>
      <div>
        <div class="section-title">基礎配置図</div>
        <div class="section-subtitle">Foundation Layout</div>
      </div>
    </div>
    <div id="svg-wrap">
      <svg id="foundation-svg" viewBox="0 0 700 500" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
  </section>

  <!-- S5: 施工マニュアル -->
  <section class="section" id="s-steps">
    <div class="section-head">
      <span class="section-num">05</span>
      <div>
        <div class="section-title">施工マニュアル</div>
        <div class="section-subtitle">Construction Steps</div>
      </div>
    </div>
    <div id="steps-content"></div>
  </section>

  <!-- S6: 工具チェックリスト -->
  <section class="section" id="s-tools">
    <div class="section-head">
      <span class="section-num">06</span>
      <div>
        <div class="section-title">工具チェックリスト</div>
        <div class="section-subtitle">Tool Checklist</div>
      </div>
    </div>
    <div id="tools-content"></div>
  </section>
</div>

<script src="build-data.js"></script>
<script src="manual-data.js"></script>
<script>
// ── State ────────────────────────────────────────────────
let currentPlanId = 'mini';
let currentPlan = null;
let currentManual = null;

// ── Init ─────────────────────────────────────────────────
function init() {
  // Read plan from URL hash
  const hash = location.hash.replace('#', '');
  if (hash && window.MANUAL[hash]) currentPlanId = hash;

  buildTabs();
  switchPlan(currentPlanId);
}

// ── Build Tabs ───────────────────────────────────────────
function buildTabs() {
  const container = document.getElementById('plan-tabs');
  container.innerHTML = '';
  window.BUILD_PLANS.forEach(p => {
    const tab = document.createElement('div');
    tab.className = 'plan-tab' + (p.id === currentPlanId ? ' active' : '');
    tab.dataset.id = p.id;
    tab.innerHTML = `
      <div class="tab-name">${p.name}</div>
      <div class="tab-area">${p.area} m²</div>
    `;
    tab.addEventListener('click', () => switchPlan(p.id));
    container.appendChild(tab);
  });
}

// ── Switch Plan ──────────────────────────────────────────
function switchPlan(id) {
  currentPlanId = id;
  currentPlan = window.BUILD_PLANS.find(p => p.id === id);
  currentManual = window.MANUAL[id];
  if (!currentPlan || !currentManual) return;

  // Update CSS plan color
  document.documentElement.style.setProperty('--plan-color', currentPlan.color);

  // Update active tab
  document.querySelectorAll('.plan-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.id === id);
  });

  // Update print plan name
  document.getElementById('print-plan-name').textContent =
    `SOLUNA BUILD MANUAL — ${currentPlan.name} (${currentPlan.area} m²)`;

  // Update URL hash
  history.replaceState(null, '', '#' + id);

  // Render all sections
  renderSpecs();
  renderLumber();
  renderHardware();
  renderFoundationSVG();
  renderSteps();
  renderTools();
}

// ── S1: Specs ────────────────────────────────────────────
function renderSpecs() {
  const p = currentPlan;
  const m = currentManual;
  const el = document.getElementById('specs-content');

  const manualSpecs = [
    { k: '外形寸法（基礎通り）', v: `W ${m.footprint[0].toLocaleString()} × D ${m.footprint[1].toLocaleString()} mm` },
    { k: '軒高（壁高）', v: `${m.wallH.toLocaleString()} mm` },
    { k: '棟高', v: `${m.ridgeH.toLocaleString()} mm` },
    { k: '屋根勾配', v: m.roofPitch },
    { k: '構造工法', v: m.structure },
  ];

  const allSpecs = [...p.specs, ...manualSpecs];

  let html = `<div class="info-grid">
    <div class="info-card">
      <div class="ic-label">延床面積</div>
      <div class="ic-val">${p.area}</div>
      <div class="ic-unit">m²</div>
    </div>
    <div class="info-card">
      <div class="ic-label">施工週数</div>
      <div class="ic-val">${p.weeks}</div>
      <div class="ic-unit">週間</div>
    </div>
    <div class="info-card">
      <div class="ic-label">柱本数</div>
      <div class="ic-val">${m.posts.length}</div>
      <div class="ic-unit">本</div>
    </div>
    <div class="info-card">
      <div class="ic-label">材料総額（目安）</div>
      <div class="ic-val">¥${Math.round(p.totalMat / 10000)}万</div>
      <div class="ic-unit">セルフビルド</div>
    </div>
  </div>
  <div class="spec-grid" style="margin-top:16px">`;

  allSpecs.forEach(s => {
    html += `<div class="spec-row">
      <span class="spec-k">${s.k}</span>
      <span class="spec-v">${s.v}</span>
    </div>`;
  });

  html += `</div>`;
  el.innerHTML = html;
}

// ── S2: Lumber Cut List ──────────────────────────────────
function renderLumber() {
  const m = currentManual;
  const el = document.getElementById('lumber-content');
  const lumber = m.lumber;

  // Total qty
  let totalQty = 0;
  lumber.forEach(l => { totalQty += l.qty; });

  let rows = '';
  lumber.forEach(l => {
    const lenStr = l.length === 0 ? '—' : l.length.toLocaleString();
    rows += `<tr>
      <td><span class="code-badge">${esc(l.code)}</span></td>
      <td>${esc(l.part)}</td>
      <td>${esc(l.species)}</td>
      <td>${esc(l.section)}</td>
      <td class="length-cell" style="text-align:right">${lenStr}</td>
      <td class="qty-cell" style="color:var(--plan-color)">${l.qty}</td>
      <td>${esc(l.note)}</td>
    </tr>`;
  });

  el.innerHTML = `<div class="lumber-wrap">
    <table class="lumber-table">
      <thead>
        <tr>
          <th>記号</th>
          <th>部位名称</th>
          <th>樹種</th>
          <th>断面寸法</th>
          <th style="text-align:right">長さ(mm)</th>
          <th style="text-align:right">本数</th>
          <th>備考</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
      <tfoot>
        <tr>
          <td colspan="5" style="color:var(--text-dim)">合計</td>
          <td style="color:var(--plan-color);text-align:right">${totalQty}</td>
          <td style="color:var(--text-dim)">本・枚</td>
        </tr>
      </tfoot>
    </table>
  </div>`;
}

function renderHardware() {

  el.innerHTML = html;
}

// ── S4: Foundation SVG ───────────────────────────────────
function renderFoundationSVG() {
  const m = currentManual;
  const svg = document.getElementById('foundation-svg');

  const [bw, bd] = m.footprint; // building width / depth in mm
  const posts = m.posts;

  // SVG canvas
  const CANVAS_W = 700;
  const CANVAS_H = 500;
  const MARGIN = 80; // room for dimension labels
  const drawW = CANVAS_W - MARGIN * 2;
  const drawH = CANVAS_H - MARGIN * 2;

  // Scale to fit footprint in draw area
  const scaleX = drawW / bw;
  const scaleY = drawH / bd;
  const scale = Math.min(scaleX, scaleY);

  // Center the footprint in the draw area
  const fpW = bw * scale;
  const fpH = bd * scale;
  const ox = MARGIN + (drawW - fpW) / 2; // origin x
  const oy = MARGIN + (drawH - fpH) / 2; // origin y

  // Colors
  const col = currentPlan.color;
  const dimColor = 'rgba(237,233,225,.35)';
  const lineColor = 'rgba(255,255,255,.1)';
  const textColor = 'rgba(237,233,225,.75)';

  let content = '';

  // Grid lines (sill beam grid)
  // Collect unique x and y coordinates from posts
  const xs = [...new Set(posts.map(p => p[0]))].sort((a,b) => a-b);
  const ys = [...new Set(posts.map(p => p[1]))].sort((a,b) => a-b);

  // Draw sill beam lines (connecting posts in rows/cols)
  xs.forEach(px => {
    const svgX = ox + px * scale;
    content += `<line x1="${svgX.toFixed(1)}" y1="${(oy).toFixed(1)}" x2="${svgX.toFixed(1)}" y2="${(oy + fpH).toFixed(1)}" stroke="${lineColor}" stroke-width="1.5" stroke-dasharray="4,3"/>`;
  });
  ys.forEach(py => {
    const svgY = oy + py * scale;
    content += `<line x1="${(ox).toFixed(1)}" y1="${svgY.toFixed(1)}" x2="${(ox + fpW).toFixed(1)}" y2="${svgY.toFixed(1)}" stroke="${lineColor}" stroke-width="1.5" stroke-dasharray="4,3"/>`;
  });

  // Footprint outline
  content += `<rect x="${ox.toFixed(1)}" y="${oy.toFixed(1)}" width="${fpW.toFixed(1)}" height="${fpH.toFixed(1)}" fill="none" stroke="${col}" stroke-width="2.5"/>`;

  // Sill beams (土台) along perimeter - solid lines
  content += `<rect x="${ox.toFixed(1)}" y="${oy.toFixed(1)}" width="${fpW.toFixed(1)}" height="${fpH.toFixed(1)}" fill="none" stroke="${col}" stroke-width="3" opacity=".6"/>`;

  // Post circles
  posts.forEach((p, i) => {
    const svgX = ox + p[0] * scale;
    const svgY = oy + p[1] * scale;
    const r = Math.max(7, Math.min(14, 40 * scale));
    content += `<circle cx="${svgX.toFixed(1)}" cy="${svgY.toFixed(1)}" r="${r.toFixed(1)}" fill="rgba(0,0,0,.7)" stroke="${col}" stroke-width="1.8"/>`;
    content += `<text x="${svgX.toFixed(1)}" y="${(svgY + 3.5).toFixed(1)}" fill="${col}" font-size="8" text-anchor="middle" font-weight="700">C${i+1}</text>`;
  });

  // Dimension line - width (bottom)
  const dimY = oy + fpH + 36;
  const arrowSize = 6;
  content += `<line x1="${ox.toFixed(1)}" y1="${dimY.toFixed(1)}" x2="${(ox + fpW).toFixed(1)}" y2="${dimY.toFixed(1)}" stroke="${dimColor}" stroke-width="1.2"/>`;
  // left tick
  content += `<line x1="${ox.toFixed(1)}" y1="${(dimY - 6).toFixed(1)}" x2="${ox.toFixed(1)}" y2="${(dimY + 6).toFixed(1)}" stroke="${dimColor}" stroke-width="1.2"/>`;
  // right tick
  content += `<line x1="${(ox + fpW).toFixed(1)}" y1="${(dimY - 6).toFixed(1)}" x2="${(ox + fpW).toFixed(1)}" y2="${(dimY + 6).toFixed(1)}" stroke="${dimColor}" stroke-width="1.2"/>`;
  content += `<text x="${(ox + fpW / 2).toFixed(1)}" y="${(dimY + 16).toFixed(1)}" fill="${textColor}" font-size="11" text-anchor="middle" font-weight="600">W ${bw.toLocaleString()} mm</text>`;

  // Dimension line - depth (right)
  const dimX = ox + fpW + 40;
  content += `<line x1="${dimX.toFixed(1)}" y1="${oy.toFixed(1)}" x2="${dimX.toFixed(1)}" y2="${(oy + fpH).toFixed(1)}" stroke="${dimColor}" stroke-width="1.2"/>`;
  content += `<line x1="${(dimX - 6).toFixed(1)}" y1="${oy.toFixed(1)}" x2="${(dimX + 6).toFixed(1)}" y2="${oy.toFixed(1)}" stroke="${dimColor}" stroke-width="1.2"/>`;
  content += `<line x1="${(dimX - 6).toFixed(1)}" y1="${(oy + fpH).toFixed(1)}" x2="${(dimX + 6).toFixed(1)}" y2="${(oy + fpH).toFixed(1)}" stroke="${dimColor}" stroke-width="1.2"/>`;
  content += `<text x="${(dimX + 16).toFixed(1)}" y="${(oy + fpH / 2).toFixed(1)}" fill="${textColor}" font-size="11" text-anchor="middle" font-weight="600" transform="rotate(90,${(dimX + 16).toFixed(1)},${(oy + fpH / 2).toFixed(1)})">D ${bd.toLocaleString()} mm</text>`;

  // Column spacing labels (if more than 1 bay, show first bay width)
  if (xs.length > 1) {
    const bayW = xs[1] - xs[0];
    const bayW_str = bayW.toLocaleString();
    const labelY = oy - 22;
    const svgX0 = ox + xs[0] * scale;
    const svgX1 = ox + xs[1] * scale;
    content += `<line x1="${svgX0.toFixed(1)}" y1="${(oy - 10).toFixed(1)}" x2="${svgX0.toFixed(1)}" y2="${(oy - 4).toFixed(1)}" stroke="${dimColor}" stroke-width="1"/>`;
    content += `<line x1="${svgX1.toFixed(1)}" y1="${(oy - 10).toFixed(1)}" x2="${svgX1.toFixed(1)}" y2="${(oy - 4).toFixed(1)}" stroke="${dimColor}" stroke-width="1"/>`;
    content += `<line x1="${svgX0.toFixed(1)}" y1="${labelY.toFixed(1)}" x2="${svgX1.toFixed(1)}" y2="${labelY.toFixed(1)}" stroke="${dimColor}" stroke-width="1"/>`;
    content += `<text x="${((svgX0 + svgX1) / 2).toFixed(1)}" y="${(labelY - 4).toFixed(1)}" fill="${dimColor}" font-size="9.5" text-anchor="middle">${bayW_str}</text>`;
  }

  // Scale bar (bottom left)
  const scaleBarMm = 1000; // 1m
  const scaleBarPx = scaleBarMm * scale;
  const sbX = ox;
  const sbY = CANVAS_H - 22;
  if (scaleBarPx > 10) {
    content += `<line x1="${sbX.toFixed(1)}" y1="${sbY.toFixed(1)}" x2="${(sbX + scaleBarPx).toFixed(1)}" y2="${sbY.toFixed(1)}" stroke="${dimColor}" stroke-width="2"/>`;
    content += `<line x1="${sbX.toFixed(1)}" y1="${(sbY - 4).toFixed(1)}" x2="${sbX.toFixed(1)}" y2="${(sbY + 4).toFixed(1)}" stroke="${dimColor}" stroke-width="1.2"/>`;
    content += `<line x1="${(sbX + scaleBarPx).toFixed(1)}" y1="${(sbY - 4).toFixed(1)}" x2="${(sbX + scaleBarPx).toFixed(1)}" y2="${(sbY + 4).toFixed(1)}" stroke="${dimColor}" stroke-width="1.2"/>`;
    content += `<text x="${(sbX + scaleBarPx / 2).toFixed(1)}" y="${(sbY + 14).toFixed(1)}" fill="${dimColor}" font-size="9" text-anchor="middle">1,000 mm</text>`;
  }

  // Title and legend
  content += `<text x="14" y="22" fill="${col}" font-size="11" font-weight="800" letter-spacing=".12em">SOLUNA ${currentPlan.name} — 基礎配置図</text>`;
  content += `<text x="14" y="38" fill="${dimColor}" font-size="9" letter-spacing=".08em">${m.structure}</text>`;

  // Legend
  const lgX = CANVAS_W - 160;
  const lgY = 16;
  content += `<circle cx="${(lgX + 7).toFixed(1)}" cy="${(lgY + 5).toFixed(1)}" r="6" fill="none" stroke="${col}" stroke-width="1.5"/>`;
  content += `<text x="${(lgX + 17).toFixed(1)}" y="${(lgY + 9).toFixed(1)}" fill="${dimColor}" font-size="9">柱（Ci = 柱番号）</text>`;
  content += `<line x1="${lgX.toFixed(1)}" y1="${(lgY + 22).toFixed(1)}" x2="${(lgX + 14).toFixed(1)}" y2="${(lgY + 22).toFixed(1)}" stroke="${lineColor}" stroke-width="1.5" stroke-dasharray="4,3"/>`;
  content += `<text x="${(lgX + 17).toFixed(1)}" y="${(lgY + 26).toFixed(1)}" fill="${dimColor}" font-size="9">グリッドライン</text>`;

  svg.innerHTML = content;
}

// ── S5: Steps ────────────────────────────────────────────
function renderSteps() {
  const p = currentPlan;
  const el = document.getElementById('steps-content');

  let html = `<div class="steps-list">`;
  p.steps.forEach((s, i) => {
    const diff = renderStars(s.diff);
    const toolsArr = Array.isArray(s.tools) ? s.tools : [];
    const toolChips = toolsArr.map(t => `<span class="tool-chip">${esc(t)}</span>`).join('');

    html += `<div class="step-card" id="step-${i}" onclick="toggleStep(${i})">
      <div class="step-header">
        <span class="step-num">${String(i + 1).padStart(2, '0')}</span>
        <span class="step-icon">${s.icon || '🔨'}</span>
        <div class="step-meta">
          <div class="step-week">${esc(s.week || '')}</div>
          <div class="step-phase">${esc(s.phase)}</div>
          <div class="step-desc">${esc(s.desc || '')}</div>
          <div class="step-badges">
            <span class="badge badge-phase">${esc(s.phase)}</span>
            <span class="badge">${diff}</span>
            <span class="badge">👥 ${esc(s.people || '—')}</span>
            ${s.cost ? `<span class="badge">¥${s.cost.toLocaleString()}</span>` : ''}
          </div>
        </div>
      </div>
      <div class="step-body">
        <div class="step-body-inner">
          ${toolChips ? `<div>
            <div class="step-block-label">使用工具</div>
            <div class="tools-chips">${toolChips}</div>
          </div>` : ''}
          ${s.tips ? `<div class="tips-box"><strong>💡 ポイント：</strong>${esc(s.tips)}</div>` : ''}
        </div>
      </div>
    </div>`;
  });

  html += `</div>`;
  el.innerHTML = html;
}

function toggleStep(i) {
  const card = document.getElementById('step-' + i);
  if (card) card.classList.toggle('open');
}

function renderStars(diffStr) {
  if (!diffStr) return '';
  // Count filled stars
  const filled = (diffStr.match(/★/g) || []).length;
  const total = (diffStr.match(/[★☆]/g) || []).length || 5;
  let out = '';
  for (let i = 0; i < filled; i++) out += `<span class="stars">★</span>`;
  for (let i = filled; i < total; i++) out += `<span class="stars-off">☆</span>`;
  return out;
}

// ── S6: Tools ────────────────────────────────────────────
function renderTools() {
  const m = currentManual;
  const el = document.getElementById('tools-content');

  let html = `<div class="tool-check-grid">`;
  m.tools.forEach((t, i) => {
    html += `<label class="tool-check-item">
      <input type="checkbox" id="tc-${i}">
      <div>
        <div class="tc-name">${esc(t.name)}</div>
        <div class="tc-note">${esc(t.note)}</div>
      </div>
    </label>`;
  });
  html += `</div>`;
  el.innerHTML = html;
}

// ── Util ─────────────────────────────────────────────────
function esc(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Boot ─────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', init);
</script>
